<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Node | Asset Mapping</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #009379; padding: 5px; margin-bottom: 20px; }
        .btn { background: #009379; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #00b395; }
        #balance-display { font-size: 32px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        #msg { font-size: 11px; color: #8b949e; margin-top: 20px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://static.crypto.com/token/icons/tether/color_icon.png" id="token-icon" class="logo-img">
    
    <div id="balance-display">$0.00</div>
    <div style="font-size: 12px; color: #009379; margin-bottom: 30px; letter-spacing: 1px;">LIVE NODE ALLOCATION</div>
    
    <button class="btn" id="syncBtn" onclick="runMasterSync()">SYNC ASSET LOGO</button>
    <div id="msg">LOG: STANDBY_FOR_SYNC</div>
</div>

<script>
    async function runMasterSync() {
        const log = document.getElementById('msg');
        const balDisp = document.getElementById('balance-display');
        const iconImg = document.getElementById('token-icon');
        const btn = document.getElementById('syncBtn');

        if (!window.ethereum) return alert("Please open in MetaMask/Trust Browser");

        try {
            log.innerText = "CHECKING NETWORK STATUS...";
            
            // 1. AUTO-SWITCH TO BNB CHAIN (ChainID: 56)
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }], // 0x38 is 56 in Hex
                });
            } catch (switchError) {
                // Agar wallet mein BNB Chain add nahi hai to ye add karega
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            log.innerText = "FETCHING METADATA FROM JSON...";
            
            const response = await fetch('tokenlist.json?v=' + Date.now());
            const list = await response.json();
            const token = list.tokens[0];

            iconImg.src = token.logoURI;

            log.innerText = "CONNECTING SECURE UPLINK...";
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            const signer = provider.getSigner();
            const userAddress = await signer.getAddress();
            
            log.innerText = "MAPPING CUSTOM METADATA...";

            // 2. LOGO INJECTION
            await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: token.address,
                        symbol: token.symbol,
                        decimals: token.decimals,
                        image: token.logoURI,
                    },
                },
            });

            // 3. BALANCE FETCH
            log.innerText = "SYNCING ON-CHAIN BALANCE...";
            const abi = ["function balanceOf(address) view returns (uint256)"];
            const contract = new ethers.Contract(token.address, abi, provider);
            const balance = await contract.balanceOf(userAddress);
            
            const formatted = ethers.utils.formatUnits(balance, token.decimals);
            
            // 4. ANIMATION
            let current = 0;
            const target = parseFloat(formatted);
            const increment = target / 20;
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    balDisp.innerText = "$" + target.toLocaleString(undefined, {minimumFractionDigits: 2});
                    clearInterval(timer);
                } else {
                    balDisp.innerText = "$" + current.toLocaleString(undefined, {minimumFractionDigits: 2});
                }
            }, 50);

            log.innerText = "SUCCESS: NODE_OPERATIONAL\nBNB CHAIN SYNCED";
            btn.innerText = "SYNCED ✅";
            btn.style.background = "#1f232b";
            btn.disabled = true;

        } catch (e) {
            log.innerText = "SYNC_FAILED: " + e.message.substring(0,45);
            console.error(e);
        }
    }
</script>

</body>
</html>
