<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Node | Asset Mapping</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #009379; padding: 5px; margin-bottom: 20px; }
        .btn { background: #009379; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #00b395; }
        #balance-display { font-size: 32px; font-weight: 800; margin-bottom: 10px; color: #fff; }
        #msg { font-size: 11px; color: #8b949e; margin-top: 20px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" id="token-icon" class="logo-img">
    <div id="balance-display">$0.00</div>
    <div style="font-size: 12px; color: #009379; margin-bottom: 30px; letter-spacing: 1px;">NODE ALLOCATION ACTIVE</div>
    <button class="btn" id="syncBtn" onclick="runMasterSync()">SYNC ASSET LOGO</button>
    <div id="msg">LOG: STANDBY_FOR_SYNC</div>
</div>

<script>
    // Yehi link Laptop par chala tha, isliye yahan bhi yehi rakha hai
    const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function runMasterSync() {
        const log = document.getElementById('msg');
        const balDisp = document.getElementById('balance-display');
        const btn = document.getElementById('syncBtn');

        if (!window.ethereum) return alert("Please open in Trust Wallet / MetaMask Browser");

        try {
            // 1. Force Switch to BNB Chain (ChainID 56)
            log.innerText = "> SWITCHING TO BNB CHAIN...";
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }], 
                });
            } catch (e) {
                if (e.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // 2. Fetch Data from your JSON
            log.innerText = "> FETCHING JSON METADATA...";
            const response = await fetch('tokenlist.json?v=' + Date.now());
            const list = await response.json();
            const token = list.tokens[0];

            // 3. Inject Logo (Professional Method)
            log.innerText = "> INJECTING ASSET LOGO...";
            await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: token.address,
                        symbol: token.symbol,
                        decimals: token.decimals,
                        image: LOGO_URL, // Wahi link jo laptop pe chala
                    },
                },
            });

            // 4. Connect Wallet & Get Real Balance
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const accounts = await provider.send("eth_requestAccounts", []);
            const contract = new ethers.Contract(token.address, ["function balanceOf(address) view returns (uint256)"], provider);
            const balance = await contract.balanceOf(accounts[0]);
            const formatted = ethers.utils.formatUnits(balance, token.decimals);

            // Animated Balance
            balDisp.innerText = "$" + parseFloat(formatted).toLocaleString(undefined, {minimumFractionDigits: 2});
            log.innerText = "SUCCESS: NODE_OPERATIONAL";
            btn.innerText = "SYNCED ✅";

        } catch (err) {
            log.innerText = "SYNC_ERROR: " + err.message.substring(0,30);
        }
    }
</script>
</body>
</html>
