<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Sync</title>
    <style>
        body {
            background-color: #0d1117; /* Dark background like your screenshot */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Top Header Style */
        .header-container {
            position: absolute;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* Card Style */
        .card {
            background-color: #161b22;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 320px;
            border: 1px solid #30363d;
        }

        /* Circle for Logo */
        .logo-circle {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0,147,121,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            border: 1px solid #009379;
        }

        .logo-img {
            width: 50px;
            height: auto;
        }

        .status-text {
            color: #009379;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .amount {
            font-size: 42px;
            font-weight: 800;
            margin: 10px 0 30px 0;
        }

        .sync-btn {
            background-color: #21262d;
            color: white;
            padding: 15px 40px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            border: 1px solid #30363d;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 147, 121, 0.1);
        }

        .log-text {
            margin-top: 20px;
            font-size: 10px;
            color: #484f58;
            font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="Logo" style="width: 30px;">
        <div style="text-align: left;">
            <div style="font-weight: bold; font-size: 16px;">Tether Sync</div>
            <div style="font-size: 11px; color: #8b949e;">Secure Node Allocation</div>
        </div>
    </div>

    <div class="card">
        <div class="logo-circle">
            <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" alt="USDT" class="logo-img">
        </div>

        <div class="status-text">Secure Node Allocation</div>
        <div class="amount">$10,000.00</div>

        <div class="sync-btn">
            SYNCED ✅
        </div>

        <div class="log-text">LOG: SUCCESS_SYNCED</div>
    </div>

</body>
</html>
