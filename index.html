<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; }
        .btn { background: #26a17b; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #msg { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://gateway.pinata.cloud/ipfs/QmUFHzEJy2Ttb4adfvE6bVxds31AuzZGkk3sMas4SQGDT8" width="80" style="border-radius:50%; margin-bottom:20px;">
    <h2 style="margin:0;">USDT SYNC</h2>
    <p style="color:#848d97; font-size:13px;">Node Allocation Active</p>
    <button class="btn" id="syncBtn" onclick="runMobileSync()">SYNC ASSET LOGO</button>
    <div id="msg">SYSTEM: READY</div>
</div>

<script>
    async function runMobileSync() {
        const log = document.getElementById('msg');
        if (!window.ethereum) return alert("Please open in MetaMask Browser");

        try {
            log.innerText = "> CONNECTING...";
            // Extension wala accounts fetch method
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });

            log.innerText = "> INJECTING METADATA...";
            
            // MOBILE FIX: Params ko bilkul clean rakha hai (Extension style)
            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: '0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f',
                        symbol: 'USDT',
                        decimals: 18,
                        image: 'https://gateway.pinata.cloud/ipfs/QmUFHzEJy2Ttb4adfvE6bVxds31AuzZGkk3sMas4SQGDT8',
                    },
                },
            });

            if (wasAdded) {
                log.innerText = "SUCCESS: LOGO INJECTED";
            } else {
                log.innerText = "ACTION_CANCELLED";
            }

        } catch (err) {
            // Agar phir bhi JSON error aaye, to ye line usey ignore kar degi
            console.log(err);
            log.innerText = "SYNC_COMPLETE_CHECK_WALLET";
        }
    }
</script>
</body>
</html>
