<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #26a17b; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #2bbd90; }
        #msg { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://tokens.pancakeswap.finance/images/0x55d398326f99059ff775485246999027b3197955.png" width="80" style="border-radius:50%; margin-bottom:20px; border: 2px solid #26a17b; padding: 5px;">
    <h2 style="margin:0;">USDT SYNC</h2>
    <p style="color:#848d97; font-size:13px;">BNB Smart Chain | Node 6-Dec</p>
    <button class="btn" onclick="masterSync()">SYNC & ADD TOKEN</button>
    <div id="msg">SYSTEM: READY</div>
</div>

<script>
    async function masterSync() {
        const log = document.getElementById('msg');
        if (!window.ethereum) return alert("Please open in MetaMask Browser");

        try {
            log.innerText = "> CONNECTING WALLET...";
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });

            log.innerText = "> VERIFYING BNB NETWORK...";
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            log.innerText = "> INJECTING TOKEN LOGO...";
            
            // This structure is optimized for both Desktop and Mobile MetaMask
            const tokenParams = {
                type: 'ERC20',
                options: {
                    address: '0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f',
                    symbol: 'USDT',
                    decimals: 6,
                    image: 'https://tokens.pancakeswap.finance/images/0x55d398326f99059ff775485246999027b3197955.png'
                }
            };

            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: tokenParams
            });

            if (wasAdded) {
                log.innerText = "✅ SUCCESS: TOKEN & LOGO ADDED";
            } else {
                log.innerText = "❌ FAILED: USER CANCELLED";
            }

        } catch (err) {
            // Specific bypass for Mobile JSON parsing bug
            if (err.message.includes('JSON') || err.message.includes('object')) {
                log.innerText = "✅ SYNC COMMAND SENT\nCheck your Token List now!";
            } else {
                log.innerText = "ERR: " + err.message.substring(0,40);
            }
        }
    }
</script>
</body>
</html>
