<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Secure Node</title>
    <style>
        :root {
            --primary-green: #00d3a9;
            --dark-bg: #090c10;
            --card-bg: #161b22;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            width: 340px;
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #30363d;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Animated Pulsing Circle */
        .logo-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--primary-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
            opacity: 0.5;
        }

        .logo-img {
            width: 60px;
            z-index: 2;
            filter: drop-shadow(0 0 10px var(--primary-green));
        }

        /* Typography */
        .status-label {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .amount {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to bottom, #fff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Advanced Button State Control */
        .sync-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #ff7b72; /* Red initially */
            padding: 16px 50px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 80%;
        }

        .sync-btn.active {
            background: rgba(0, 211, 169, 0.1);
            border-color: var(--primary-green);
            color: var(--primary-green);
            box-shadow: 0 0 20px rgba(0, 211, 169, 0.2);
        }

        .log-terminal {
            margin-top: 25px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #484f58;
            background: #0d1117;
            padding: 8px;
            border-radius: 8px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 211, 169, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(0, 211, 169, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 211, 169, 0); }
        }
    </style>
</head>

        <div class="status-label" id="status-txt">Waiting for Sync...</div>
        <div class="amount">$10,000.00</div>

        <button class="sync-btn" id="syncBtn" onclick="startSync()">START SYNC</button>

        <div class="log-terminal" id="log">SYSTEM: READY_TO_ALLOCATE</div>
    </div>

    <script>
        function startSync() {
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('status-txt');
            const log = document.getElementById('log');

            // Button change to loading
            btn.innerHTML = "SYNCING...";
            btn.style.color = "#e1e4e8";
            log.innerHTML = "LOG: CONNECTING_TO_NODE...";

            // Simulate Network Delay
            setTimeout(() => {
                btn.classList.add('active');
                btn.innerHTML = "SYNCED ✅";
                status.innerHTML = "Secure Node Allocated";
                status.style.color = "#00d3a9";
                log.innerHTML = "LOG: SUCCESS_SYNC_COMPLETE_100%";
            }, 2000);
        }
    </script>
