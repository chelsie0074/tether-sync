<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Logo Header</title>
    <style>
        /* CSS Styling */
        .header-container {
            display: flex;
            align-items: center; /* Logo aur text ko vertical center karne ke liye */
            gap: 15px;           /* Logo aur text ke beech ka fasla */
            padding: 10px;
            background-color: #f8f9fa; /* Background color (optional) */
            border-bottom: 1px solid #ddd;
        }

        .logo-img {
            width: 50px;         /* Logo ka size yahan se change karein */
            height: auto;
            display: block;
        }

        .header-text {
            font-family: Arial, sans-serif;
        }

        .header-text h1 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .header-text p {
            margin: 0;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <img src="aapka-logo-url-yahan-dalein.png" alt="Company Logo" class="logo-img">
        
        <div class="header-text">
            <h1>Aapka Brand Name</h1>
            <p>Yahan apni tagline ya description likhein</p>
        </div>
    </div>

</body>
</html>
